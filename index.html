ZAR_datiles_bounty.jpg\" alt=\"Dátiles rellenos estilo Bounty\">\n  </div>\n\n  <p class=\"nota\">Rinde 2 dátiles (receta fácilmente multiplicable)</p>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>2 dátiles Medjool</li>\n    <li>2 cucharadas de coco rallado</li>\n    <li>1 cucharadita de aceite de coco</li>\n    <li>1 cucharadita de jarabe de arce</li>\n    <li>3 cucharadas de chocolate negro, derretido</li>\n    <li>Coco rallado extra, para cubrir</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Cortar cada dátil a lo largo de un lado y retirar el carozo, abriéndolo en un pequeño bote: un bolsillo limpio sostiene el relleno de coco sin que se rompa.</li>\n    <li>Mezclar el coco rallado con el aceite de coco y el jarabe de arce hasta que se compacte, y presionarlo dentro de cada dátil: ligarlo primero evita que el relleno se desarme.</li>\n    <li>Congelar los dátiles rellenos durante unos diez minutos, ya que enfriarlos firmes hace que el baño de chocolate quede mucho más prolijo.</li>\n    <li>Bañar cada dátil en el chocolate negro derretido hasta cubrirlo por completo y colocarlo sobre papel manteca: un baño uniforme es lo que les da esa textura de bombón.</li>\n    <li>Esparcir coco rallado extra por encima mientras el chocolate todavía está húmedo, porque así queda adherido a medida que se endurece la cobertura.</li>\n  </ol>\n  <p class=\"nota\">Tiempo de preparación: 15 minutos, sin cocción.</p>\n</div>", "categoria": "Dulces y postres"}, {"titulo": "Dátiles rellenos de pistacho", "img": "REEMPLAZAR_datiles_pistacho.jpg", "ingredientes": ["chocolate con leche", "datiles", "manteca de pistacho", "pistachos"], "ingredientes_raw_canon": [["datiles"], ["manteca de pistacho", "pistachos"], ["chocolate con leche"], ["pistachos"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Dátiles rellenos de pistacho</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_datiles_pistacho.jpg\" alt=\"Dátiles rellenos de pistacho\">\n  </div>\n\n  <p class=\"nota\">Rinde 2 dátiles (receta fácilmente multiplicable)</p>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>2 dátiles Medjool</li>\n    <li>1 cucharada de manteca de pistacho o pistachos pelados enteros</li>\n    <li>3 cucharadas de chocolate con leche, derretido</li>\n    <li>1 cucharada de pistachos picados, para cubrir</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Cortar cada dátil a lo largo de un lado y retirar el carozo, abriéndolo en un pequeño bote: un bolsillo limpio sostiene el relleno de pistacho sin que se rompa.</li>\n    <li>Presionar la manteca de pistacho o los pistachos enteros dentro de cada dátil, ya que un relleno firme le da al chocolate algo sólido para cubrir.</li>\n    <li>Congelar los dátiles rellenos durante unos diez minutos, porque enfriarlos firmes hace que el baño quede mucho más prolijo.</li>\n    <li>Bañar cada dátil en el chocolate derretido hasta cubrirlo y colocarlo sobre papel manteca: un baño uniforme es lo que le da ese terminado de chocolatería.</li>\n    <li>Esparcir los pistachos picados por encima mientras el chocolate todavía está húmedo, porque así quedan adheridos a medida que se endurece la cobertura.</li>\n  </ol>\n  <p class=\"nota\">Tiempo de preparación: 15 minutos, sin cocción.</p>\n</div>", "categoria": "Dulces y postres"}, {"titulo": "Zanahorias asadas con base de yogur, tahini y hierbas", "img": "fotos/Zanahorias_asadas_con_base_de_yogur__tahini_y_hierbas.jpg", "ingredientes": ["aceite de oliva", "aji molido/chile en polvo", "ajo", "eneldo", "limon", "menta", "miel", "nueces", "oregano", "pecanas", "perejil", "pimenton", "pimienta negra", "queso cotija/feta", "sal", "tahini", "yogur", "zanahorias"], "ingredientes_raw_canon": [["zanahorias"], ["aceite de oliva"], ["pimenton", "ajo", "oregano", "aji molido/chile en polvo"], ["sal", "pimienta negra"], ["yogur"], ["tahini"], ["limon"], ["ajo"], ["eneldo"], ["perejil"], ["aceite de oliva"], ["nueces", "pecanas"], ["eneldo", "menta", "perejil"], ["miel"], ["queso cotija/feta"], ["aji molido/chile en polvo"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Zanahorias asadas con base de yogur, tahini y hierbas</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Zanahorias_asadas_con_base_de_yogur__tahini_y_hierbas.jpg\" alt=\"Zanahorias asadas con base de yogur, tahini y hierbas\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes — Zanahorias</h3>\n  <ul class=\"ingredientes\">\n    <li>900 g de zanahorias (aproximadamente 2 lbs)</li>\n    <li>2 cucharadas de aceite de oliva</li>\n    <li>1 cucharadita de pimentón ahumado, ½ cucharadita de ajo en polvo, 1 cucharadita de orégano, 1 cucharadita de pimienta de Alepo o ají molido</li>\n    <li>Sal y pimienta, a gusto</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Base de yogur, tahini y hierbas</h3>\n  <ul class=\"ingredientes\">\n    <li>1 taza de yogur griego espeso</li>\n    <li>¼ a ⅓ taza de tahini</li>\n    <li>Ralladura y jugo de un limón chico</li>\n    <li>1 diente de ajo</li>\n    <li>Un puñado pequeño de eneldo fresco (aproximadamente 2 cucharadas)</li>\n    <li>Un puñado pequeño de perejil fresco (aproximadamente 2 cucharadas)</li>\n    <li>1 cucharada de aceite de oliva</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Toppings</h3>\n  <ul class=\"ingredientes\">\n    <li>3 cucharadas de nueces o pecanas trituradas</li>\n    <li>2 cucharadas de hierbas frescas picadas finas (mezcla de eneldo, menta y perejil)</li>\n    <li>1 a 2 cucharadas de miel, para rociar</li>\n    <li>30 g de queso feta desgranado</li>\n    <li>Pimienta de Alepo o ají molido</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Precalentar el horno a 230 °C (450 °F).</li>\n    <li>Pelar las zanahorias y cortar a lo largo las más gruesas, para que todas se cocinen de manera pareja: esto es clave.</li>\n    <li>Mezclar las zanahorias con el aceite de oliva, la sal y las especias. Distribuirlas en una placa para horno y hornear durante 18 a 20 minutos, hasta que los bordes queden tiernos y ligeramente tostados.</li>\n    <li>Mientras tanto, preparar la base mezclando el yogur griego, el tahini, la ralladura y el jugo de limón, el ajo, el eneldo y el perejil picados, y el aceite de oliva, hasta integrar bien.</li>\n    <li>Extender la base de yogur y tahini en el fondo de una fuente para servir.</li>\n    <li>Disponer las zanahorias asadas por encima.</li>\n    <li>Finalizar con las nueces o pecanas trituradas, las hierbas frescas picadas, un rocío de miel, el queso feta desgranado y un toque de pimienta de Alepo o ají molido.</li>\n  </ol>\n  <p class=\"nota\">El método original se interrumpía después del horneado de las zanahorias; los pasos finales de armado son una reconstrucción razonable a partir de los ingredientes listados.</p>\n</div>", "categoria": "Vegetales y guarniciones"}, {"titulo": "Tortitas crocantes de chocolate y manteca de maní con cereal proteico", "img": "REEMPLAZAR_tortitas_proteicas.jpg", "ingredientes": ["cereal proteico crocante", "chips de chocolate", "manteca de mani", "sal"], "ingredientes_raw_canon": [["chips de chocolate"], ["manteca de mani"], ["cereal proteico crocante"], ["sal"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Tortitas crocantes de chocolate y manteca de maní con cereal proteico</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_tortitas_proteicas.jpg\" alt=\"Tortitas crocantes de chocolate y manteca de maní con cereal proteico\">\n  </div>\n\n  <p class=\"nota\">Rinde 12 tortitas</p>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>180 g de chocolate o chips de chocolate (1 taza)</li>\n    <li>200 g de manteca de maní suave (¾ taza)</li>\n    <li>270 g de cereal proteico crocante (3 tazas; las marcas pesan distinto, conviene medir por taza)</li>\n    <li>Una pizca de sal marina (opcional)</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Forrar un molde para 12 muffins con pirotines de papel o usar un molde de silicona.</li>\n    <li>Derretir el chocolate suavemente en el microondas en intervalos de 20 a 30 segundos, revolviendo entre cada uno.</li>\n    <li>Incorporar la manteca de maní y mezclar hasta que quede lisa (si está dura, calentarla 20 segundos en el microondas para que quede líquida y cubra bien el cereal).</li>\n    <li>Agregar el cereal proteico crocante y mezclar suavemente hasta que quede bien cubierto.</li>\n    <li>Repartir la mezcla en los 12 moldecitos y presionar firmemente para que las tortitas mantengan su forma.</li>\n    <li>Congelar durante aproximadamente 1 hora, o hasta que esté firme.</li>\n  </ol>\n  <p class=\"nota\">Conservación: se guardan en un recipiente hermético en la heladera hasta 2 semanas, o en el freezer hasta 3 meses. Se pueden comer directo del freezer dejándolas descongelar unos 10 minutos antes.</p>\n</div>", "categoria": "Desayuno y meriendas"}, {"titulo": "Sándwich de pollo Caesar con limón y hierbas", "img": "REEMPLAZAR_sandwich_pollo_caesar.jpg", "ingredientes": ["aceite de oliva", "aceite vegetal", "agua", "ajo", "albahaca", "cebolla", "harina comun", "huevos", "lechuga", "limon", "manteca", "mayonesa", "mostaza", "pan", "pan rallado/panko", "perejil", "pimenton", "pimienta negra", "pollo", "queso parmesano", "sal", "salsa worcestershire"], "ingredientes_raw_canon": [["pollo"], ["sal"], ["ajo"], ["cebolla"], ["pimienta negra"], ["pimenton"], ["aceite vegetal"], ["pan rallado/panko"], ["perejil"], ["limon"], ["albahaca"], ["huevos"], ["agua"], ["harina comun"], ["sal"], ["pimienta negra"], ["ajo"], ["cebolla"], ["pimenton"], ["mayonesa"], ["ajo"], ["salsa worcestershire"], ["mostaza"], ["limon"], ["limon"], ["queso parmesano"], ["p so parmesano recién rallado</li>\n    <li>1 cucharadita de pimienta negra recién molida</li>\n    <li>2 cucharadas de aceite de oliva extra virgen</li>\n    <li>1 cucharada de perejil fresco picado</li>\n    <li>1 cucharadita de albahaca seca</li>\n    <li>1 a 2 cucharadas de agua (para aligerar la salsa)</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Ensalada Caesar de limón y hierbas</h3>\n  <ul class=\"ingredientes\">\n    <li>2 tazas de lechuga picada</li>\n    <li>3 cucharadas de aderezo Caesar de limón y hierbas</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Para armar</h3>\n  <ul class=\"ingredientes\">\n    <li>3 panes (tipo bollo o baguette chica)</li>\n    <li>3 cucharadas de manteca, para tostar el pan</li>\n    <li>Queso parmesano, recién rallado</li>\n    <li>Aderezo Caesar de limón y hierbas</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Condimentar el pollo con sal, pimienta, ajo en polvo, cebolla en polvo y pimentón ahumado.</li>\n    <li>En un bowl, romper los huevos, agregar el agua y batir hasta que quede liso. Reservar.</li>\n    <li>En otro bowl, mezclar la harina, la sal, la pimienta, el ajo en polvo, la cebolla en polvo y el pimentón ahumado.</li>\n    <li>En un bowl aparte, colocar el pan rallado tipo panko, el perejil, la albahaca y la ralladura de limón.</li>\n    <li>Pasar los filetes de pollo condimentados por el huevo batido, luego por la mezcla de harina, después nuevamente por el huevo batido, y finalmente por el pan rallado.</li>\n    <li>Calentar aceite en una sartén hasta que alcance 180 °C (350 °F). Agregar el pollo y cocinar de 4 a 5 minutos, dando vuelta a mitad de cocción, hasta que alcance una temperatura interna de 74 °C (165 °F).</li>\n    <li>Mezclar todos los ingredientes del aderezo para preparar el aderezo Caesar de limón y hierbas.</li>\n    <li>Agregar la lechuga a parte del aderezo y reservar el resto para usar más adelante.</li>\n    <li>Untar el pan con manteca y tostarlo hasta que esté crocante. Untar el aderezo reservado sobre una cara del pan. Colocar el pollo empanado encima. Agregar la ensalada Caesar de limón y hierbas. Decorar con queso parmesano rallado, cerrar el sándwich y servir.</li>\n  </ol>\n  <p class=\"nota\">El orden de empanado (huevo, harina, huevo, pan rallado) está transcripto tal como figura en la receta original.</p>\n</div>", "categoria": "Pollo"}], "categories": {"Lácteos y huevos": ["huevos", "leche", "crema de leche", "queso crema", "queso rallado", "queso parmesano", "queso mozzarella", "queso azul", "queso cotija/feta", "halloumi", "ricota", "yogur", "buttermilk", "manteca", "queso gruyere", "queso (general)", "queso mascarpone"], "Carnes y pescados": ["pollo", "carne vacuna", "pescado blanco", "langostinos/mariscos"], "Verduras y vegetales": ["repollo", "zucchini", "brocoli", "berenjenas", "boniato/batata", "papas/papines", "choclo/maiz", "tomates", "tomates secos", "morron", "cebolla", "cebolla de verdeo", "ajo", "jengibre", "pepino", "palta", "jalapeño", "espinaca", "lechuga", "hojas verdes", "esparragos", "edamame", "garbanzos", "arvejas", "remolacha", "zanahorias", "apio", "champiñones", "calabaza", "puerro"], "Frutas": ["arandanos", "duraznos", "limon", "mango", "manzanas", "banana", "naranja", "granada", "datiles"], "Harinas y granos": ["harina comun", "harina de arroz", "harina de avena", "avena", "arroz", "quinoa", "cuscus perlado/orzo", "pasta/fideos", "fecula de maiz", "fecula de mandioca", "pan", "pan rallado/panko", "harina de trigo sarraceno"], "Frutos secos y semillas": ["almendras", "nueces", "castañas de caju", "mani", "pistachos", "semillas de sesamo", "semillas de canamo", "semillas de alcaravea", "tahini", "semillas de chia", "pecanas"], "Aceites y grasas": ["aceite de oliva", "aceite vegetal", "aceite de coco", "manteca de mani", "manteca de castañas de caju", "manteca de pistacho"], "Condimentos y salsas": ["sal", "pimienta negra", "pimenton", "comino", "curcuma", "oregano", "tomillo", "romero", "aji molido/chile en polvo", "chile crisp/picante", "condimento italiano", "mostaza", "mayonesa", "vinagre", "vinagre de arroz", "vinagre de manzana", "aceto balsamico", "salsa de soja", "salsa worcestershire", "salsa sriracha", "salsa adobo/chipotle", "pasta de curry", "canela", "salitre", "ras el hanout", "anis estrella", "clavo de olor", "coriandro", "semillas de mostaza"], "Endulzantes": ["azucar", "miel", "jarabe de arce/miel", "xilitol/endulzante", "jalea kero"], "Hierbas frescas": ["perejil", "cilantro", "menta", "eneldo", "ciboulette", "estragon", "albahaca"], "Repostería": ["levadura", "polvo de hornear", "bicarbonato de sodio", "esencia de vainilla", "esencia de almendra", "chocolate blanco", "chocolate semiamargo/amargo", "chocolate con leche", "chips de chocolate", "cacao", "pasta de avellanas y chocolate (nutella)", "frambuesas liofilizadas", "galletitas"], "Otros": ["leche de coco", "coco rallado", "proteina en polvo", "tofu", "anchoas", "vodka", "cafe", "caldo", "agua", "vino tinto", "cereal proteico crocante"]}};
</script>
<script>
(function(){
  const recetas = APP_DATA.recetas;
  const categories = APP_DATA.categories;

  const selected = new Set();

  const pantryCategoriesEl = document.getElementById('pantryCategories');
  const pantrySearchEl = document.getElementById('pantrySearch');
  const selectedCountEl = document.getElementById('selectedCount');
  const clearAllBtn = document.getElementById('clearAll');
  const categoryNavEl = document.getElementById('categoryNav');
  const recipeSectionsEl = document.getElementById('recipeSections');
  const resultsTitleEl = document.getElementById('resultsTitle');
  const resultsMetaEl = document.getElementById('resultsMeta');
  const modalBackdrop = document.getElementById('modalBackdrop');
  const modalContent = document.getElementById('modalContent');

  const CATEGORY_ORDER = [
    'Desayuno y meriendas',
    'Dulces y postres',
    'Pollo',
    'Carnes y pescados',
    'Pastas y ñoquis',
    'Vegetales y guarniciones',
    'Ensaladas',
    'Sopas',
    'Panes y tartas',
    'Dips y otros'
  ];

  function slugify(s){
    return s.toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/(^-|-$)/g, '');
  }

  function renderCategoryNav(){
    categoryNavEl.innerHTML = '';
    CATEGORY_ORDER.forEach(cat => {
      if(!recetas.some(r => r.categoria === cat)) return;
      const a = document.createElement('a');
      a.href = '#cat-' + slugify(cat);
      a.className = 'cat-nav-chip';
      a.textContent = cat;
      categoryNavEl.appendChild(a);
    });
  }

  function label(s){
    return s.charAt(0).toUpperCase() + s.slice(1);
  }

  // Build pantry chip UI
  function renderPantry(){
    pantryCategoriesEl.innerHTML = '';
    Object.keys(categories).forEach(cat => {
      const items = categories[cat];
      const block = document.createElement('div');
      block.className = 'cat-block';
      block.dataset.cat = cat;

      const title = document.createElement('p');
      title.className = 'cat-title';
      title.textContent = cat;
      block.appendChild(title);

      const grid = document.createElement('div');
      grid.className = 'chip-grid';

      items.forEach(ing => {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'chip';
        chip.textContent = label(ing);
        chip.dataset.ing = ing;
        chip.addEventListener('click', () => toggleIngredient(ing, chip));
        grid.appendChild(chip);
      });

      block.appendChild(grid);
      pantryCategoriesEl.appendChild(block);
    });
  }

  function toggleIngredient(ing, chipEl){
    if(selected.has(ing)){
      selected.delete(ing);
      chipEl.classList.remove('active');
    } else {
      selected.add(ing);
      chipEl.classList.add('active');
    }
    updateSelectedCount();
    renderRecipes();
  }

  function updateSelectedCount(){
    selectedCountEl.textContent = selected.size + (selected.size === 1 ? ' seleccionado' : ' seleccionados');
  }

  clearAllBtn.addEventListener('click', () => {
    selected.clear();
    document.querySelectorAll('.chip.active').forEach(c => c.classList.remove('active'));
    updateSelectedCount();
    renderRecipes();
  });

  pantrySearchEl.addEventListener('input', () => {
    const q = pantrySearchEl.value.trim().toLowerCase();
    document.querySelectorAll('.chip').forEach(chip => {
      const text = chip.textContent.toLowerCase();
      chip.classList.toggle('hidden', q.length > 0 && !text.includes(q));
    });
    document.querySelectorAll('.cat-block').forEach(block => {
      const visibleChips = block.querySelectorAll('.chip:not(.hidden)');
      block.style.display = visibleChips.length === 0 ? 'none' : '';
    });
  });

  function computeMatch(receta){
    const total = receta.ingredientes.length;
    if(total === 0) return {have: 0, total: 0, missing: [], pct: 0};
    const missing = receta.ingredientes.filter(i => !selected.has(i));
    const have = total - missing.length;
    const pct = Math.round((have / total) * 100);
    return {have, total, missing, pct};
  }

  function buildCard(r, m, hasSelection){
    const card = document.createElement('div');
    card.className = 'card';
    card.addEventListener('click', () => openModal(r, m));

    const isPlaceholder = r.img && r.img.startsWith('REEMPLAZAR');
    if(isPlaceholder){
      const ph = document.createElement('div');
      ph.className = 'card-img placeholder';
      ph.textContent = 'Foto del plato';
      card.appendChild(ph);
    } else {
      const img = document.createElement('img');
      img.className = 'card-img';
      img.src = r.img;
      img.alt = r.titulo;
      img.loading = 'lazy';
      card.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'card-body';

    const h3 = document.createElement('h3');
    h3.className = 'card-title';
    h3.textContent = r.titulo;
    body.appendChild(h3);

    if(hasSelection){
      const matchRow = document.createElement('div');
      matchRow.className = 'match-row';
      const bar = document.createElement('div');
      bar.className = 'match-bar';
      const fill = document.createElement('div');
      fill.className = 'match-bar-fill';
      fill.style.width = m.pct + '%';
      bar.appendChild(fill);
      const lbl = document.createElement('span');
      lbl.className = 'match-label' + (m.pct === 100 ? ' full' : '');
      lbl.textContent = m.pct === 100 ? '¡Lista!' : m.pct + '%';
      matchRow.appendChild(bar);
      matchRow.appendChild(lbl);
      body.appendChild(matchRow);

      const missingLine = document.createElement('p');
      missingLine.className = 'missing-line';
      if(m.missing.length === 0){
        missingLine.innerHTML = 'Tenés todo lo que necesitás';
      } else if(m.missing.length <= 3){
        missingLine.innerHTML = 'Te falta: <b>' + m.missing.map(label).join(', ') + '</b>';
      } else {
        missingLine.innerHTML = 'Te faltan <b>' + m.missing.length + ' ingredientes</b>';
      }
      body.appendChild(missingLine);
    } else {
      const missingLine = document.createElement('p');
      missingLine.className = 'missing-line';
      missingLine.textContent = r.ingredientes.length + ' ingredientes';
      body.appendChild(missingLine);
    }

    card.appendChild(body);
    return card;
  }

  function renderRecipes(){
    const hasSelection = selected.size > 0;

    recipeSectionsEl.innerHTML = '';
    let totalRecetas = 0;
    let totalCompletas = 0;

    CATEGORY_ORDER.forEach(cat => {
      const recetasCat = recetas.filter(r => r.categoria === cat);
      if(recetasCat.length === 0) return;

      let list = recetasCat.map(r => ({r, m: computeMatch(r)}));
      if(hasSelection){
        list.sort((a, b) => {
          if(b.m.pct !== a.m.pct) return b.m.pct - a.m.pct;
          return a.m.missing.length - b.m.missing.length;
        });
      }

      totalRecetas += list.length;
      const completasCat = list.filter(x => x.m.pct === 100).length;
      totalCompletas += completasCat;

      const section = document.createElement('section');
      section.className = 'category-section';
      section.id = 'cat-' + slugify(cat);

      const head = document.createElement('div');
      head.className = 'results-head';
      const h2 = document.createElement('h2');
      h2.textContent = cat;
      head.appendChild(h2);
      const meta = document.createElement('span');
      meta.className = 'results-meta';
      meta.textContent = hasSelection
        ? (completasCat > 0
            ? `${completasCat} ${completasCat === 1 ? 'lista' : 'listas'} de ${list.length}`
            : `${list.length} ${list.length === 1 ? 'receta' : 'recetas'}`)
        : `${list.length} ${list.length === 1 ? 'receta' : 'recetas'}`;
      head.appendChild(meta);
      section.appendChild(head);

      const grid = document.createElement('div');
      grid.className = 'recipe-grid';
      list.forEach(({r, m}) => grid.appendChild(buildCard(r, m, hasSelection)));
      section.appendChild(grid);

      recipeSectionsEl.appendChild(section);
    });

    if(hasSelection){
      resultsTitleEl.textContent = 'Recetas ordenadas por lo que tenés';
      resultsMetaEl.textContent = totalCompletas > 0
        ? `${totalCompletas} ${totalCompletas === 1 ? 'receta lista' : 'recetas listas'} para hacer ahora`
        : 'Ninguna 100% completa todavía — seguí marcando ingredientes';
    } else {
      resultsTitleEl.textContent = 'Recetario completo';
      resultsMetaEl.textContent = `${totalRecetas} recetas en total`;
    }
  }

  function openModal(receta, match){
    modalContent.innerHTML = '';

    const closeBtn = document.createElement('button');
    closeBtn.className = 'modal-close';
    closeBtn.innerHTML = '&times;';
    closeBtn.addEventListener('click', closeModal);
    modalContent.appendChild(closeBtn);

    const tmp = document.createElement('div');
    tmp.innerHTML = receta.html;

    // Replace placeholder image block if needed
    const imgEl = tmp.querySelector('.imagen-plato img');
    if(imgEl && imgEl.getAttribute('src') && imgEl.getAttribute('src').startsWith('REEMPLAZAR')){
      const wrapDiv = imgEl.closest('.imagen-plato');
      wrapDiv.classList.add('placeholder');
      wrapDiv.textContent = 'Foto del plato';
    }

    modalContent.appendChild(tmp);

    // Mark "have" ingredients line by line using the parallel raw->canon map
    if(match){
      const allLis = tmp.querySelectorAll('ul.ingredientes li');
      const rawCanon = receta.ingredientes_raw_canon || [];
      allLis.forEach((li, idx) => {
        const canonList = rawCanon[idx] || [];
        const allHave = canonList.length > 0 && canonList.every(c => selected.has(c));
        if(allHave){
          li.classList.add('have');
        }
      });
    }

    modalBackdrop.classList.add('open');
  }

  function closeModal(){
    modalBackdrop.classList.remove('open');
  }

  modalBackdrop.addEventListener('click', (e) => {
    if(e.target === modalBackdrop) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape') closeModal();
  });

  renderPantry();
  renderCategoryNav();
  updateSelectedCount();
  renderRecipes();
})();

</script>
</body>
</html>
