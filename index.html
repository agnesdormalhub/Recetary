n    <li>En un bowl, mezclar el puré de remolacha con el huevo, el queso rallado, la fécula de mandioca, el aceite de oliva y la leche hasta integrar bien.</li>\n    <li>Formar bollitos con la masa y rellenar cada uno con un trozo de queso azul en el centro, cerrando bien para que no se escape al hornear.</li>\n    <li>Disponer sobre una placa para horno y hornear hasta que estén dorados por fuera y bien cocidos por dentro.</li>\n    <li>Servir tibios.</li>\n  </ol>\n</div>", "categoria": "Panes y tartas"}, {"titulo": "Fritters de manzana sin azúcar agregada", "img": "fotos/Fritters_de_manzana_sin_azucar_agregada.jpg", "ingredientes": ["aceite de coco", "arroz", "avena", "azucar", "canela", "harina de arroz", "huevos", "jarabe de arce/miel", "manzanas", "polvo de hornear", "xilitol/endulzante"], "ingredientes_raw_canon": [["manzanas"], ["huevos"], ["aceite de coco"], ["canela"], ["polvo de hornear"], ["avena"], ["harina de arroz", "arroz"], ["azucar", "xilitol/endulzante", "jarabe de arce/miel"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Fritters de manzana sin azúcar agregada</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Fritters_de_manzana_sin_azucar_agregada.jpg\" alt=\"Fritters de manzana sin azúcar agregada\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>2 manzanas chicas cortadas en cubos pequeños (aproximadamente 70 g)</li>\n    <li>1 huevo grande</li>\n    <li>1 cucharada de aceite de coco derretido</li>\n    <li>1 cucharadita de canela</li>\n    <li>Una pizca de polvo de hornear</li>\n    <li>¼ taza de avena (aproximadamente 25 g)</li>\n    <li>¼ taza de harina de arroz (aproximadamente 25 g)</li>\n    <li>Opcional para endulzar: manteca de coco, jarabe de arce, azúcar impalpable o monkfruit en polvo</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Precalentar el horno a 190 °C (180 °C con ventilador).</li>\n    <li>En un bowl, romper el huevo y agregar el aceite de coco derretido. Batir hasta integrar.</li>\n    <li>Cortar las manzanas en cubos pequeños y agregarlas al bowl.</li>\n    <li>Incorporar la canela y agregar las harinas junto con el polvo de hornear. Mezclar bien.</li>\n    <li>Cubrir una placa para horno con papel manteca.</li>\n    <li>Formar montoncitos de la mezcla sobre la placa con una cuchara.</li>\n    <li>Hornear durante 14 a 17 minutos, o hasta que estén ligeramente dorados.</li>\n  </ol>\n</div>", "categoria": "Desayuno y meriendas"}, {"titulo": "Brownies de banana, avena y proteína", "img": "fotos/Brownies_de_banana__avena_y_proteina.jpg", "ingredientes": ["avena", "banana", "cacao", "chips de chocolate", "harina de avena", "huevos", "polvo de hornear", "proteina en polvo", "xilitol/endulzante", "yogur"], "ingredientes_raw_canon": [["huevos"], ["banana"], ["yogur"], ["harina de avena", "avena"], ["proteina en polvo"], ["cacao"], ["chips de chocolate"], ["polvo de hornear"], ["xilitol/endulzante"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Brownies de banana, avena y proteína</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Brownies_de_banana__avena_y_proteina.jpg\" alt=\"Brownies de banana, avena y proteína\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>2 huevos</li>\n    <li>1 banana pisada</li>\n    <li>2 cucharadas de yogur</li>\n    <li>1 taza de harina de avena</li>\n    <li>30 g de proteína en polvo</li>\n    <li>2 cucharadas de cacao</li>\n    <li>Chips de chocolate, a gusto</li>\n    <li>Una pizca de polvo de hornear</li>\n    <li>Xilitol u otro endulzante a gusto (opcional)</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Mezclar los ingredientes líquidos (huevos, banana pisada y yogur) hasta integrar bien.</li>\n    <li>Agregar el resto de los ingredientes secos (harina de avena, proteína, cacao, polvo de hornear y chips de chocolate) y mezclar hasta unificar.</li>\n    <li>Pasar la preparación a un molde forrado con papel manteca.</li>\n    <li>Cocinar en airfryer durante aproximadamente 15 minutos a 160 °C.</li>\n  </ol>\n</div>", "categoria": "Desayuno y meriendas"}, {"titulo": "Costillas de maíz especiadas con mayonesa de palta", "img": "fotos/Costillas_de_maiz_especiadas_con_mayonesa_de_palta.jpg", "ingredientes": ["aceite de oliva", "aji molido/chile en polvo", "ajo", "cebolla", "choclo/maiz", "jarabe de arce/miel", "limon", "oregano", "palta", "pimenton", "pimienta negra", "sal", "yogur"], "ingredientes_raw_canon": [["choclo/maiz"], ["pimenton"], ["oregano"], ["aji molido/chile en polvo"], ["cebolla"], ["ajo"], ["aceite de oliva"], ["sal", "pimienta negra"], ["palta"], ["yogur"], ["limon"], ["sal", "pimienta negra"], ["aceite de oliva"], ["jarabe de arce/miel"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Costillas de maíz especiadas con mayonesa de palta</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Costillas_de_maiz_especiadas_con_mayonesa_de_palta.jpg\" alt=\"Costillas de maíz especiadas con mayonesa de palta\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes — Costillas de maíz</h3>\n  <ul class=\"ingredientes\">\n    <li>2 choclos enteros</li>\n    <li>1 cucharadita de pimentón ahumado</li>\n    <li>1 cucharadita de orégano</li>\n    <li>½ cucharadita de chile en polvo (opcional)</li>\n    <li>½ cucharadita de cebolla en polvo</li>\n    <li>½ cucharadita de ajo en polvo</li>\n    <li>1 cucharada de aceite de oliva</li>\n    <li>Sal y pimienta, a gusto</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Mayonesa de palta</h3>\n  <ul class=\"ingredientes\">\n    <li>1 palta</li>\n    <li>½ taza de yogur griego</li>\n    <li>Jugo de 1 limón mediano</li>\n    <li>Sal y pimienta, a gusto</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Glaseado de arce (opcional)</h3>\n  <ul class=\"ingredientes\">\n    <li>1 cucharada de aceite de oliva</li>\n    <li>1 cucharada de jarabe de arce</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Cortar cada choclo a lo largo en cuartos, formando las \"costillas\".</li>\n    <li>Condimentar con el pimentón ahumado, el orégano, el chile en polvo, la cebolla en polvo, el ajo en polvo, el aceite de oliva, sal y pimienta.</li>\n    <li>Cocinar en horno o airfryer hasta que estén tiernos y dorados, dando vuelta a mitad de cocción.</li>\n    <li>Para la mayonesa de palta, procesar la palta junto con el yogur griego, el jugo de limón, sal y pimienta hasta obtener una crema lisa.</li>\n    <li>Si se desea, mezclar el aceite de oliva con el jarabe de arce y rociar sobre las costillas de maíz al servir.</li>\n    <li>Servir las costillas de maíz acompañadas con la mayonesa de palta.</li>\n  </ol>\n</div>", "categoria": "Vegetales y guarniciones"}, {"titulo": "Sopa de tomate y morrón asados", "img": "fotos/Sopa_de_tomate_y_morron_asados.jpg", "ingredientes": ["aceite de oliva", "agua", "ajo", "cebolla", "morron", "oregano", "pimienta negra", "romero", "sal", "tomates"], "ingredientes_raw_canon": [["tomates"], ["morron"], ["cebolla"], ["ajo"], ["romero"], ["aceite de oliva"], ["sal", "pimienta negra", "oregano"], ["agua"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Sopa de tomate y morrón asados</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Sopa_de_tomate_y_morron_asados.jpg\" alt=\"Sopa de tomate y morrón asados\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>5 tomates</li>\n    <li>2 morrones rojos</li>\n    <li>1 trozo de cebolla blanca</li>\n    <li>Ajo, a gusto</li>\n    <li>Romero, a gusto</li>\n    <li>Aceite de oliva</li>\n    <li>Sal, pimienta y orégano, a gusto</li>\n    <li>2 tazas de agua</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Llevar al horno los tomates, los morrones, la cebolla y el ajo con un chorrito de aceite, durante 35 minutos a 180 °C.</li>\n    <li>Licuar todas las verduras asadas junto con las 2 tazas de agua hasta obtener una preparación homogénea.</li>\n    <li>Hervir la sopa en una olla, condimentando con sal, pimienta y orégano a gusto.</li>\n    <li>Servir caliente, acompañada de un sándwich de queso.</li>\n  </ol>\n</div>", "categoria": "Sopas"}, {"titulo": "Ensalada de arroz crispy con pepino, edamame y palta", "img": "REEMPLAZAR_ensalada_arroz_crispy.jpg", "ingredientes": ["aceite vegetal", "ajo", "arroz", "azucar", "cebolla de verdeo", "cilantro", "edamame", "limon", "mani", "menta", "palta", "pepino", "salsa de soja", "vinagre de arroz"], "ingredientes_raw_canon": [["arroz"], [], ["aceite vegetal"], ["pepino"], ["menta"], ["cilantro"], ["cebolla de verdeo"], ["edamame"], ["palta"], ["mani"], ["salsa de soja"], ["arroz", "vinagre de arroz"], ["aceite vegetal"], ["azucar"], ["limon"], ["ajo"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Ensalada de arroz crispy con pepino, edamame y palta</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_ensalada_arroz_crispy.jpg\" alt=\"Ensalada de arroz crispy con pepino, edamame y palta\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes — Arroz crispy</h3>\n  <ul class=\"ingredientes\">\n    <li>2 tazas de arroz blanco cocido y frío</li>\n    <li>1 cucharada colmada de pasta de chile</li>\n    <li>3 cucharadas de aceite</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Ensalada</h3>\n  <ul class=\"ingredientes\">\n    <li>4 pepinos persas</li>\n    <li>½ atado de menta fresca</li>\n    <li>½ atado de cilantro fresco</li>\n    <li>5 cebollas de verdeo</li>\n    <li>1 taza de edamame sin cáscara</li>\n    <li>1 palta</li>\n    <li>½ taza de maní picado</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Aderezo</h3>\n  <ul class=\"ingredientes\">\n    <li>¼ taza de salsa de soja</li>\n    <li>¼ taza de vinagre de arroz condimentado</li>\n    <li>2 cucharadas de aceite</li>\n    <li>1 cucharada de azúcar negra</li>\n    <li>½ lima</li>\n    <li>1 diente de ajo</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Precalentar el horno a 200 °C y cubrir una placa con papel manteca.</li>\n    <li>En un bowl grande, mezclar el arroz cocido y frío con la pasta de chile y el aceite.</li>\n    <li>Distribuir el arroz de manera uniforme sobre la placa.</li>\n    <li>Hornear durante aproximadamente 40 minutos, mezclando cada 10 minutos para que se dore de manera pareja, vigilando que no se queme.</li>\n    <li>Una vez crocante y dorado, retirar del horno y dejar enfriar. Se puede preparar con anticipación.</li>\n    <li>Cortar todas las verduras y colocarlas en un bowl grande.</li>\n    <li>Agregar el edamame y la palta en cubos.</li>\n    <li>Para el aderezo, combinar todos los ingredientes en un frasco y agitar hasta mezclar.</li>\n    <li>Incorporar el maní picado y el arroz crocante ya frío al bowl con las verduras.</li>\n    <li>Verter el aderezo sobre la ensalada y mezclar para integrar.</li>\n    <li>Servir de inmediato.</li>\n  </ol>\n  <p class=\"nota\">Nota: si se prepara con anticipación, agregar la palta, el arroz crocante y el maní recién antes de servir para mantener la textura. El arroz crocante puede ablandarse si queda mucho tiempo mezclado con la ensalada.</p>\n</div>", "categoria": "Ensaladas"}, {"titulo": "Hummus de mango y curry", "img": "fotos/Hummus_de_mango_y_curry.jpg", "ingredientes": ["aceite de oliva", "garbanzos", "granada", "limon", "mango", "pan", "pasta de curry", "sal", "semillas de sesamo", "tahini"], "ingredientes_raw_canon": [["garbanzos"], ["mango"], ["tahini"], ["limon"], ["pasta de curry"], ["sal"], ["aceite de oliva"], ["granada"], ["semillas de sesamo"], ["pan"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Hummus de mango y curry</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Hummus_de_mango_y_curry.jpg\" alt=\"Hummus de mango y curry\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>300 g de garbanzos cocidos</li>\n    <li>1 mango</li>\n    <li>15 g de tahini</li>\n    <li>1 chorrito de jugo de lima</li>\n    <li>2 cucharadas de curry</li>\n    <li>Una pizca de sal</li>\n    <li>Aceite de oliva virgen extra</li>\n    <li>Granada, para decorar</li>\n    <li>Semillas de sésamo, para decorar</li>\n    <li>Pan, para acompañar</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Colocar en una procesadora los garbanzos cocidos, el mango, el tahini, el jugo de lima, el curry y la sal.</li>\n    <li>Procesar hasta obtener una crema lisa y homogénea, agregando aceite de oliva virgen extra hasta lograr la consistencia deseada.</li>\n    <li>Servir en un bowl, decorar con granada y semillas de sésamo, y acompañar con pan.</li>\n  </ol>\n</div>", "categoria": "Dips y otros"}, {"titulo": "Bowl de yogur con duraznos caramelizados", "img": "fotos/Bowl_de_yogur_con_duraznos_caramelizados.jpg", "ingredientes": ["avena", "canela", "chocolate semiamargo/amargo", "duraznos", "jarabe de arce/miel", "mani", "manteca", "manteca de mani", "semillas de canamo", "yogur"], "ingredientes_raw_canon": [["yogur"], ["manteca", "duraznos", "jarabe de arce/miel", "canela"], ["avena"], ["semillas de canamo"], ["chocolate semiamargo/amargo"], ["manteca de mani", "mani"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Bowl de yogur con duraznos caramelizados</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Bowl_de_yogur_con_duraznos_caramelizados.jpg\" alt=\"Bowl de yogur con duraznos caramelizados\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>Yogur de coco natural</li>\n    <li>Duraznos, caramelizados con manteca, jarabe de arce y canela</li>\n    <li>¼ taza de avena arrollada</li>\n    <li>Semillas de cáñamo</li>\n    <li>Chocolate amargo picado</li>\n    <li>1 cucharada de manteca de maní</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Cortar los duraznos en gajos.</li>\n    <li>En una sartén, caramelizar los duraznos con manteca, jarabe de arce y canela hasta que estén tiernos y dorados.</li>\n    <li>Colocar el yogur de coco en un bowl.</li>\n    <li>Disponer los duraznos caramelizados sobre el yogur.</li>\n    <li>Agregar la avena, las semillas de cáñamo y el chocolate amargo picado.</li>\n    <li>Finalizar con una cucharada de manteca de maní por encima.</li>\n  </ol>\n</div>", "categoria": "Desayuno y meriendas"}, {"titulo": "Berenjenas crispy sobre base de tomate y ajo asados", "img": "fotos/Berenjenas_crispy_sobre_base_de_tomate_y_ajo_asados.jpg", "ingredientes": ["aceite de oliva", "agua", "aji molido/chile en polvo", "ajo", "berenjenas", "choclo/maiz", "crema de leche", "fecula de maiz", "harina comun", "perejil", "pimienta negra", "queso (general)", "queso parmesano", "sal", "tomates", "tomillo"], "ingredientes_raw_canon": [["berenjenas"], ["tomates"], ["ajo"], ["aceite de oliva"], ["sal"], ["pimienta negra"], ["tomillo"], ["aji molido/chile en polvo"], ["crema de leche"], ["perejil"], ["harina comun"], ["fecula de maiz", "choclo/maiz"], ["agua"], ["sal", "pimienta negra", "aji molido/chile en polvo"], ["queso parmesano", "queso (general)"], ["perejil"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Berenjenas crispy sobre base de tomate y ajo asados</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Berenjenas_crispy_sobre_base_de_tomate_y_ajo_asados.jpg\" alt=\"Berenjenas crispy sobre base de tomate y ajo asados\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>2 berenjenas</li>\n    <li>500 g de tomates</li>\n    <li>1 cabeza de ajo</li>\n    <li>Aceite de oliva</li>\n    <li>Sal</li>\n    <li>Pimienta negra</li>\n    <li>Tomillo</li>\n    <li>Ají molido (pulbiber)</li>\n    <li>1 cucharada de crema</li>\n    <li>Maydonoz (perejil), un puñado</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Pasta crocante para empanar</h3>\n  <ul class=\"ingredientes\">\n    <li>4 cucharadas de harina</li>\n    <li>2 cucharadas de fécula de maíz</li>\n    <li>1 vaso (de té) de agua fría</li>\n    <li>Sal, pimienta negra y ají molido, a gusto</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Para servir</h3>\n  <ul class=\"ingredientes\">\n    <li>Queso parmesano</li>\n    <li>Perejil fresco</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Llevar al horno los tomates, el ajo (con piel) y las berenjenas hasta que estén tiernos y ligeramente dorados.</li>\n    <li>Una vez asados, pelar los tomates y el ajo.</li>\n    <li>En un bowl, mezclar los tomates y el ajo asados junto con la crema y el perejil, machacando hasta obtener una pasta. Extender esta mezcla en la base de una fuente para servir.</li>\n    <li>Para la pasta crocante, mezclar la harina, la fécula de maíz, el agua fría, la sal, la pimienta negra y el ají molido hasta obtener una mezcla de consistencia espesa.</li>\n    <li>Cortar las berenjenas en rodajas o bastones, pasarlas primero por la pasta crocante y luego por panko.</li>\n    <li>Freír las berenjenas hasta que estén doradas y crocantes.</li>\n    <li>Colocar las berenjenas fritas sobre la base de tomate y ajo.</li>\n    <li>Espolvorear con queso parmesano y perejil fresco antes de servir.</li>\n  </ol>\n</div>", "categoria": "Vegetales y guarniciones"}, {"titulo": "Ensalada de orzo con espárragos, almendras y parmesano", "img": "fotos/Ensalada_de_orzo_con_esparragos__almendras_y_parmesano.jpg", "ingredientes": ["aceite de oliva", "almendras", "arvejas", "ciboulette", "cilantro", "cuscus perlado/orzo", "eneldo", "esparragos", "limon", "miel", "mostaza", "perejil", "pimienta negra", "queso (general)", "queso parmesano", "sal"], "ingredientes_raw_canon": [["cuscus perlado/orzo"], ["arvejas"], ["esparragos"], ["queso parmesano", "queso (general)"], ["almendras"], ["perejil", "cilantro", "eneldo", "ciboulette"], ["aceite de oliva"], ["limon"], ["miel"], ["mostaza"], ["sal", "pimienta negra"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Ensalada de orzo con espárragos, almendras y parmesano</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Ensalada_de_orzo_con_esparragos__almendras_y_parmesano.jpg\" alt=\"Ensalada de orzo con espárragos, almendras y parmesano\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>1 taza de orzo</li>\n    <li>½ bolsa de arvejas congeladas</li>\n    <li>10 a 15 espárragos</li>\n    <li>½ taza de queso parmesano rallado</li>\n    <li>⅓ taza de almendras fileteadas tostadas</li>\n    <li>Hierbas frescas a elección (cilantro, eneldo, ciboulette, perejil, etc.)</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Aderezo</h3>\n  <ul class=\"ingredientes\">\n    <li>⅓ taza de aceite de oliva</li>\n    <li>1 limón amarillo (jugo y ralladura)</li>\n    <li>1 cucharadita de miel</li>\n    <li>1 cucharadita de mostaza Dijon</li>\n    <li>Sal y pimienta, a gusto</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>En una olla chica, agregar el orzo con 2 tazas de agua. Llevar a hervor y luego bajar el fuego. Cuando esté casi cocido, agregar las arvejas.</li>\n    <li>Una vez que se haya absorbido toda el agua, esparcir el orzo en una placa para que se enfríe más rápido.</li>\n    <li>Mientras tanto, dorar los espárragos en una sartén con un poco de aceite de oliva durante unos 5 minutos.</li>\n    <li>Al mismo tiempo, tostar las almendras fileteadas en otro sartén.</li>\n    <li>Para el aderezo, colocar todos los ingredientes en un frasco y agitar para mezclar.</li>\n    <li>Pasar el orzo a un bowl y bañarlo con la mitad del aderezo para que lo absorba.</li>\n    <li>Agregar los espárragos picados, las almendras, las hierbas, el parmesano y el resto del aderezo.</li>\n    <li>Mezclar bien y llevar a la heladera 10 minutos antes de servir.</li>\n  </ol>\n</div>", "categoria": "Ensaladas"}, {"titulo": "Tostadas de boniato con pollo y yogur", "img": "fotos/Tostadas_de_boniato_con_pollo_y_yogur.jpg", "ingredientes": ["aceite de oliva", "boniato/batata", "eneldo", "pepino", "pollo", "sal", "semillas de sesamo", "yogur"], "ingredientes_raw_canon": [["boniato/batata"], ["aceite de oliva"], ["sal"], ["yogur"], ["aceite de oliva"], ["pepino"], ["eneldo"], ["pollo"], [], ["semillas de sesamo"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Tostadas de boniato con pollo y yogur</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Tostadas_de_boniato_con_pollo_y_yogur.jpg\" alt=\"Tostadas de boniato con pollo y yogur\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes — Base</h3>\n  <ul class=\"ingredientes\">\n    <li>1 boniato cortado en rodajas de unos 2 cm</li>\n    <li>Aceite de oliva virgen extra</li>\n    <li>Sal, una pizca</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Relleno</h3>\n  <ul class=\"ingredientes\">\n    <li>2 cucharadas de yogur natural</li>\n    <li>1 cucharada de aceite de oliva virgen extra</li>\n    <li>½ pepino rallado y bien escurrido</li>\n    <li>Eneldo, a gusto</li>\n    <li>120 g de pollo desmenuzado</li>\n    <li>Especias a gusto (mix a elección)</li>\n    <li>Semillas de sésamo, para decorar (opcional)</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Rociar las rodajas de boniato con aceite de oliva virgen extra y agregar una pizca de sal.</li>\n    <li>Hornear durante aproximadamente 20 minutos a 200 °C (el tiempo dependerá del grosor y la cantidad), hasta que estén tiernas y doraditas.</li>\n    <li>Mientras tanto, mezclar en un bowl el yogur natural, el aceite de oliva, el pepino rallado y escurrido, el eneldo, el pollo desmenuzado y las especias.</li>\n    <li>Colocar la mezcla sobre las tostadas de boniato.</li>\n    <li>Agregar semillas de sésamo por encima si se desea.</li>\n  </ol>\n  <p class=\"nota\">El relleno también puede usarse para rellenar cogollos, armar wraps o sándwiches.</p>\n</div>", "categoria": "Desayuno y meriendas"}, {"titulo": "Ensalada de quinoa con halloumi y miel", "img": "fotos/Ensalada_de_quinoa_con_halloumi_y_miel.jpg", "ingredientes": ["aceite de oliva", "cebolla", "garbanzos", "halloumi", "limon", "menta", "miel", "mostaza", "palta", "pepino", "perejil", "pimienta negra", "pistachos", "quinoa", "sal", "vinagre de manzana"], "ingredientes_raw_canon": [["quinoa"], ["garbanzos"], ["cebolla"], ["vinagre de manzana"], ["palta"], ["pepino"], ["pistachos"], ["perejil", "menta"], ["halloumi"], ["miel"], ["aceite de oliva"], ["limon"], ["mostaza"], ["sal", "pimienta negra"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Ensalada de quinoa con halloumi y miel</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Ensalada_de_quinoa_con_halloumi_y_miel.jpg\" alt=\"Ensalada de quinoa con halloumi y miel\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>Quinoa cocida</li>\n    <li>Garbanzos cocidos</li>\n    <li>Cebolla morada</li>\n    <li>Vinagre de manzana</li>\n    <li>Palta</li>\n    <li>Pepinos</li>\n    <li>Pistachos</li>\n    <li>Menta y perejil frescos</li>\n    <li>Halloumi</li>\n    <li>Miel</li>\n    <li>Aceite de oliva</li>\n    <li>Jugo de limón</li>\n    <li>Mostaza Dijon</li>\n    <li>Sal y pimienta, a gusto</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Cortar la cebolla morada en juliana fina y marinarla con el vinagre de manzana.</li>\n    <li>Cortar el pepino y la palta en cubos.</li>\n    <li>Picar la menta y el perejil frescos.</li>\n    <li>Dorar el halloumi en una sartén hasta que esté ligeramente tostado de ambos lados y rociarlo con miel.</li>\n    <li>Para la vinagreta, mezclar el aceite de oliva, el jugo de limón, la mostaza Dijon, sal y pimienta.</li>\n    <li>En un bowl grande, combinar la quinoa cocida, los garbanzos, la cebolla marinada, el pepino, la palta, la menta y el perejil.</li>\n    <li>Agregar la vinagreta y mezclar bien.</li>\n    <li>Servir con el halloumi tibio por encima y finalizar con los pistachos.</li>\n  </ol>\n</div>", "categoria": "Ensaladas"}, {"titulo": "Wrap crocante de pollo estilo Caesar", "img": "REEMPLAZAR_wrap_pollo_caesar.jpg", "ingredientes": ["aceite de oliva", "aceite vegetal", "agua", "ajo", "choclo/maiz", "fecula de maiz", "harina comun", "huevos", "lechuga", "limon", "mayonesa", "palta", "pan", "pan rallado/panko", "perejil", "pimenton", "pimienta negra", "pollo", "queso (general)", "queso parmesano", "sal", "salsa worcestershire"], "ingredientes_raw_canon": [["pollo"], ["sal"], ["ajo"], ["pimenton"], ["pimienta negra"], ["aceite vegetal", "palta"], ["harina comun"], ["fecula de maiz", "choclo/maiz"], ["sal"], ["ajo"], ["pimenton"], ["pimienta negra"], ["huevos"], ["agua"], ["pan rallado/panko"], ["perejil"], ["mayonesa"], ["salsa worcestershire"], ["ajo"], ["pimienta negra"], ["sal"], ["limon"], ["aceite de oliva"], ["lechuga"], [], ["queso parmesano", "queso (general)"], ["pan"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Wrap crocante de pollo estilo Caesar</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_wrap_pollo_caesar.jpg\" alt=\"Wrap crocante de pollo estilo Caesar\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes — Pollo</h3>\n  <ul class=\"ingredientes\">\n    <li>450 g de pechuga de pollo deshuesada, cortada por la mitad a lo largo y aplanada hasta un grosor uniforme</li>\n    <li>Sal, a gusto</li>\n    <li>1 cucharada de ajo en polvo</li>\n    <li>1 cucharadita de pimentón ahumado</li>\n    <li>1 cucharadita de pimienta negra</li>\n    <li>Aceite vegetal o de palta, para freír</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Mezcla seca</h3>\n  <ul class=\"ingredientes\">\n    <li>1 taza de harina común</li>\n    <li>2 cucharadas de fécula de maíz</li>\n    <li>Sal, a gusto</li>\n    <li>1 cucharada de ajo en polvo</li>\n    <li>1 cucharadita de pimentón ahumado</li>\n    <li>1 cucharadita de pimienta negra</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Mezcla de huevo</h3>\n  <ul class=\"ingredientes\">\n    <li>2 huevos</li>\n    <li>¼ taza de agua</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Empanado</h3>\n  <ul class=\"ingredientes\">\n    <li>2 tazas de pan rallado tipo panko</li>\n    <li>1 cucharada de perejil seco</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Salsa Caesar</h3>\n  <ul class=\"ingredientes\">\n    <li>1 taza de mayonesa</li>\n    <li>1 cucharadita de salsa Worcestershire</li>\n    <li>1 cucharada de ajo en polvo</li>\n    <li>½ cucharadita de pimienta negra</li>\n    <li>Sal, a gusto</li>\n    <li>1 cucharada de jugo de limón recién exprimido</li>\n    <li>1 a 2 cucharadas de aceite de oliva extra virgen</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Ensalada</h3>\n  <ul class=\"ingredientes\">\n    <li>2 tazas de lechuga</li>\n    <li>½ taza de aderezo Caesar</li>\n    <li>⅓ taza de queso parmesano recién rallado</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Para armar</h3>\n  <ul class=\"ingredientes\">\n    <li>4 tortillas grandes</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Secar el pollo con papel de cocina y dejarlo plano. Espolvorear sal, pimienta, pimentón ahumado y ajo en polvo de manera uniforme en ambos lados.</li>\n    <li>En un recipiente, mezclar la harina, la fécula de maíz, sal, pimienta, pimentón ahumado y ajo en polvo.</li>\n    <li>En otro recipiente, batir los huevos con el agua.</li>\n    <li>En un tercer recipiente, combinar el panko con el perejil seco.</li>\n    <li>Pasar el pollo primero por la mezcla seca, luego por la mezcla de huevo y finalmente por el panko, presionando bien para que se adhiera.</li>\n    <li>Calentar aceite a 180 °C y freír los filetes de pollo hasta que estén dorados y crocantes, durante 4 a 5 minutos o hasta que la temperatura interna alcance los 74 °C. Cortar el pollo en tiras y reservar.</li>\n    <li>En un bowl, mezclar la mayonesa, la salsa Worcestershire, el aceite de oliva, el jugo de limón, sal, pimienta y ajo en polvo para preparar la salsa Caesar.</li>\n    <li>En otro bowl, preparar la ensalada Caesar combinando la lechuga, el aderezo Caesar y el queso parmesano. Mezclar bien.</li>\n    <li>Armar los wraps colocando sobre cada tortilla la salsa Caesar, la ensalada Caesar y las tiras de pollo. Cerrar el wrap y calentar brevemente. Servir tibio.</li>\n  </ol>\n</div>", "categoria": "Pollo"}, {"titulo": "Sartén crocante de batata y huevos", "img": "REEMPLAZAR_batata_huevos.jpg", "ingredientes": ["aceite de oliva", "aceite vegetal", "boniato/batata", "chile crisp/picante", "hojas verdes", "huevos", "mayonesa", "palta", "pimienta negra", "queso rallado", "tomates"], "ingredientes_raw_canon": [["boniato/batata"], ["aceite de oliva"], ["huevos"], ["pimienta negra"], ["queso rallado"], ["palta"], ["tomates"], ["hojas verdes"], ["mayonesa"], ["aceite vegetal", "chile crisp/picante"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Sartén crocante de batata y huevos</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_batata_huevos.jpg\" alt=\"Sartén crocante de batata y huevos\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>Batata, cortada en rodajas finas</li>\n    <li>Aceite de oliva</li>\n    <li>2 huevos</li>\n    <li>Pimienta, a gusto</li>\n    <li>Queso rallado</li>\n    <li>Palta</li>\n    <li>Tomates</li>\n    <li>Hojas verdes</li>\n    <li>Mayonesa casera (opcional)</li>\n    <li>Aceite picante crocante (chile crisp, opcional)</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Calentar una sartén con aceite de oliva y agregar las rodajas finas de batata en una sola capa. Tapar y cocinar hasta que comiencen a dorarse.</li>\n    <li>Romper 2 huevos sobre las batatas, separar las yemas y distribuirlas sobre la preparación. Agregar pimienta, tapar brevemente y cocinar sin pasar de punto.</li>\n    <li>Dar vuelta la preparación y agregar el queso rallado, la palta, los tomates y las hojas verdes. Si se desea, sumar mayonesa casera y aceite picante crocante.</li>\n    <li>Doblar a la mitad y tapar nuevamente hasta que el queso se derrita.</li>\n    <li>Servir como sándwich o cortado en porciones.</li>\n  </ol>\n</div>", "categoria": "Desayuno y meriendas"}, {"titulo": "Pasta cremosa de pollo al ajo y parmesano", "img": "REEMPLAZAR_pasta_pollo_parmesano.jpg", "ingredientes": ["aceite vegetal", "agua", "aji molido/chile en polvo", "ajo", "azucar", "caldo", "cebolla", "condimento italiano", "crema de leche", "harina comun", "leche", "manteca", "pasta/fideos", "perejil", "pimenton", "pimienta negra", "pollo", "queso (general)", "queso parmesano", "sal"], "ingredientes_raw_canon": [["pollo"], ["sal"], ["pimenton"], ["ajo"], ["pimienta negra"], ["aceite vegetal"], ["manteca"], ["manteca"], ["cebolla"], ["ajo"], ["harina comun"], ["pollo", "agua", "caldo"], ["azucar", "leche", "crema de leche"], ["sal"], ["pimenton"], ["aji molido/chile en polvo"], ["pimienta negra"], ["ajo"], ["perejil"], ["condimento italiano"], ["queso parmesano", "queso (general)"], ["pasta/fideos"], ["queso parmesano", "queso (general)"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Pasta cremosa de pollo al ajo y parmesano</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_pasta_pollo_parmesano.jpg\" alt=\"Pasta cremosa de pollo al ajo y parmesano\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes — Pollo</h3>\n  <ul class=\"ingredientes\">\n    <li>450 g de pechuga de pollo deshuesada (aplanada levemente para una cocción pareja)</li>\n    <li>Sal, a gusto</li>\n    <li>1 cucharadita de pimentón ahumado</li>\n    <li>1 cucharada de ajo en polvo</li>\n    <li>1 cucharadita de pimienta negra</li>\n    <li>2 cucharadas de aceite (para la marinada)</li>\n    <li>2 cucharadas de manteca clarificada (ghee)</li>\n    <li>1 cucharada de manteca</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Salsa</h3>\n  <ul class=\"ingredientes\">\n    <li>1 cebolla amarilla chica, picada fina</li>\n    <li>1 cucharada de ajo fresco picado</li>\n    <li>2 cucharadas de harina común</li>\n    <li>1½ tazas de caldo de pollo (o 1 cubo de caldo de pollo + 1½ tazas de agua)</li>\n    <li>1½ tazas de crema de leche espesa sin azúcar</li>\n    <li>Sal, a gusto</li>\n    <li>1 cucharada de pimentón ahumado</li>\n    <li>1 cucharadita de ají molido (red chili flakes)</li>\n    <li>½ cucharadita de pimienta negra</li>\n    <li>1 cucharadita de ajo en polvo</li>\n    <li>1 cucharada de perejil seco</li>\n    <li>1 cucharada de condimento italiano (italian seasoning)</li>\n    <li>½ taza de queso parmesano recién rallado</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Para armar</h3>\n  <ul class=\"ingredientes\">\n    <li>285 g de pasta a elección (hervida según las indicaciones del paquete)</li>\n    <li>Queso parmesano extra, para servir (opcional)</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Marinar el pollo: en un bowl, condimentar el pollo con sal, pimienta negra, ajo en polvo y pimentón ahumado. Rociar con aceite y mezclar bien para cubrir. Tapar y dejar marinar al menos 1 hora.</li>\n    <li>Cocinar el pollo: calentar la manteca clarificada en una sartén a fuego medio. Agregar el pollo y cocinar 8 a 10 minutos, dando vuelta a mitad de cocción, hasta que esté dorado y bien cocido (temperatura interna de 74 °C). Retirar de la sartén, cortar en fetas y reservar.</li>\n    <li>Preparar la salsa: en la misma sartén, agregar la manteca. Una vez derretida, incorporar la cebolla y saltear 1 minuto hasta que esté translúcida. Agregar el ajo picado y cocinar 30 segundos más, hasta que desprenda aroma.</li>\n    <li>Condimentar la base: agregar sal, pimienta negra, ajo en polvo, pimentón ahumado, ají molido y condimento italiano. Mezclar para combinar.</li>\n    <li>Espesar la salsa: incorporar la harina y revolver durante 1 minuto para quitarle el sabor a crudo. Agregar gradualmente el caldo de pollo, revolviendo constantemente hasta que espese (2 a 4 minutos).</li>\n    <li>Lograr la cremosidad: verter la crema de leche y batir hasta que quede lisa. Dejar hervir suavemente entre 3 y 5 minutos hasta que espese levemente. Agregar el queso parmesano y el perejil seco, revolviendo hasta que se funda y quede cremoso.</li>\n    <li>Armar: incorporar la pasta cocida a la salsa y mezclar bien para que se cubra por completo. Coronar con las fetas de pollo y espolvorear con más parmesano si se desea.</li>\n    <li>Servir: decorar con perejil y un toque extra de parmesano. Disfrutar tibio.</li>\n  </ol>\n</div>", "categoria": "Pollo"}, {"titulo": "Pollo parmesano crocante con pasta a la vodka", "img": "REEMPLAZAR_pollo_parmesano_vodka.jpg", "ingredientes": ["aceite de oliva", "aji molido/chile en polvo", "ajo", "albahaca", "avena", "cebolla", "choclo/maiz", "harina de avena", "huevos", "oregano", "pasta/fideos", "perejil", "pimienta negra", "pollo", "queso (general)", "queso mozzarella", "queso parmesano", "sal", "vodka", "yogur"], "ingredientes_raw_canon": [["pollo"], ["harina de avena", "avena"], ["huevos"], ["choclo/maiz"], ["sal"], ["pimienta negra"], ["oregano"], [], ["queso mozzarella", "queso (general)"], ["queso parmesano", "queso (general)"], ["pasta/fideos"], ["aceite de oliva"], ["cebolla"], ["ajo"], ["vodka"], ["pasta/fideos", "vodka"], ["yogur"], ["queso parmesano", "queso (general)"], ["pimienta negra"], ["aji molido/chile en polvo"], ["perejil", "albahaca"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Pollo parmesano crocante con pasta a la vodka</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_pollo_parmesano_vodka.jpg\" alt=\"Pollo parmesano crocante con pasta a la vodka\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes — Pollo parmesano</h3>\n  <ul class=\"ingredientes\">\n    <li>450 g de pechuga de pollo, cortada en filetes</li>\n    <li>½ taza de harina de avena</li>\n    <li>2 huevos, batidos</li>\n    <li>1 taza de copos de maíz (cornflakes) finamente triturados</li>\n    <li>½ cucharadita de sal</li>\n    <li>½ cucharadita de pimienta negra</li>\n    <li>1 cucharadita de orégano seco</li>\n    <li>1 taza de salsa marinara baja en sodio</li>\n    <li>¾ taza de queso mozzarella parcialmente descremado</li>\n    <li>½ taza de queso parmesano rallado</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Pasta a la vodka</h3>\n  <ul class=\"ingredientes\">\n    <li>340 g de pasta tipo penne de garbanzo o lenteja</li>\n    <li>1 cucharadita de aceite de oliva</li>\n    <li>1 cebolla chica, picada fina</li>\n    <li>3 dientes de ajo, picados</li>\n    <li>¼ taza de vodka</li>\n    <li>1 frasco de salsa vodka para pasta (aproximadamente 680 g)</li>\n    <li>½ taza de yogur griego natural descremado, a temperatura ambiente</li>\n    <li>½ taza de queso parmesano rallado</li>\n    <li>½ cucharadita de pimienta negra</li>\n    <li>½ cucharadita de ají molido (opcional)</li>\n    <li>Albahaca o perejil fresco picado, para decorar</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Preparar el rebozado del pollo: en un bowl, mezclar la harina de avena con sal, pimienta y orégano. En un segundo bowl, batir los huevos. En un tercer bowl, colocar los copos de maíz triturados.</li>\n    <li>Empanar el pollo: pasar cada filete primero por la harina de avena, luego por el huevo batido y finalmente presionarlo sobre los copos de maíz hasta cubrirlo por completo.</li>\n    <li>Cocinar el pollo en airfryer: precalentar el airfryer a 200 °C. Colocar los filetes en una sola capa, rociar levemente con aceite y cocinar 12 a 15 minutos, dando vuelta a mitad de cocción, hasta que estén crocantes y la temperatura interna alcance los 74 °C.</li>\n    <li>Agregar salsa y queso: distribuir la salsa marinara sobre el pollo cocido, cubrir con la mozzarella y el parmesano, y volver a colocar en el airfryer 2 a 3 minutos más, hasta que el queso se derrita y burbujee.</li>\n    <li>Cocinar la pasta: hervir la pasta de garbanzo en agua con sal hasta que esté al dente. Reservar ½ taza del agua de cocción y luego colar.</li>\n    <li>Preparar la salsa vodka: en una sartén, calentar el aceite de oliva a fuego medio. Agregar la cebolla y saltear unos minutos hasta que se ablande. Incorporar el ajo y cocinar 1 minuto más hasta que desprenda aroma. Verter el vodka y dejar reducir 1 minuto.</li>\n    <li>Incorporar la salsa: agregar la salsa vodka del frasco y dejar cocinar 5 minutos. Retirar del fuego e incorporar el yogur griego, mezclando hasta que quede cremosa. Agregar el parmesano, la pimienta y el ají molido, revolviendo hasta integrar.</li>\n    <li>Terminar la pasta: incorporar la pasta colada a la salsa y mezclar bien, agregando un poco del agua de cocción reservada si es necesario para aflojar la salsa.</li>\n    <li>Servir: emplatar la pasta junto al pollo parmesano crocante. Decorar con albahaca o perejil fresco y parmesano extra si se desea.</li>\n  </ol>\n</div>", "categoria": "Pollo"}, {"titulo": "Panchitos de langostinos en pan brioche", "img": "REEMPLAZAR_panchitos_langostinos.jpg", "ingredientes": ["agua", "apio", "cebolla", "ciboulette", "eneldo", "langostinos/mariscos", "limon", "mayonesa", "pan", "sal", "yogur"], "ingredientes_raw_canon": [["langostinos/mariscos"], ["sal", "agua"], ["mayonesa"], ["yogur"], ["limon"], ["cebolla"], ["apio"], ["eneldo"], ["ciboulette"], ["pan"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Panchitos de langostinos en pan brioche</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_panchitos_langostinos.jpg\" alt=\"Panchitos de langostinos en pan brioche\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>Langostinos</li>\n    <li>Sal, para el agua de cocción</li>\n    <li>Mayonesa</li>\n    <li>Yogur griego</li>\n    <li>Jugo y ralladura de lima</li>\n    <li>Cebolla morada</li>\n    <li>Apio</li>\n    <li>Eneldo</li>\n    <li>Ciboulette</li>\n    <li>Pan brioche tipo panchito</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Blanquear los langostinos: hervir agua con sal. Esto es importante para que queden jugosos.</li>\n    <li>Poner los langostinos en el agua hirviendo solo 1 minuto.</li>\n    <li>Pasarlos inmediatamente a agua fría o hielo.</li>\n    <li>Escurrir y cortarlos en trozos medianos.</li>\n    <li>Para la base cremosa, mezclar en un bowl la mayonesa, el yogur griego y el jugo y ralladura de lima. Esto hace que quede más liviano y fresco.</li>\n    <li>Agregar los vegetales: cebolla morada, apio, eneldo y ciboulette.</li>\n    <li>Incorporar los langostinos y mezclar suave para no romperlos demasiado.</li>\n    <li>Rellenar los panes brioche con la preparación y servir.</li>\n  </ol>\n</div>", "categoria": "Carnes y pescados"}, {"titulo": "Pasta casera de arándanos con champiñones", "img": "REEMPLAZAR_pasta_arandanos.jpg", "ingredientes": ["aceite vegetal", "agua", "arandanos", "cebolla", "champiñones", "ciboulette", "fecula de mandioca", "harina comun", "limon", "manteca", "queso rallado", "romero", "sal"], "ingredientes_raw_canon": [["arandanos"], ["agua"], ["harina comun", "fecula de mandioca"], ["champiñones"], ["romero"], ["aceite vegetal"], ["sal"], ["cebolla"], ["manteca"], ["limon"], ["queso rallado"], ["ciboulette"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Pasta casera de arándanos con champiñones</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_pasta_arandanos.jpg\" alt=\"Pasta casera de arándanos con champiñones\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes — Pasta</h3>\n  <ul class=\"ingredientes\">\n    <li>Arándanos</li>\n    <li>Agua</li>\n    <li>Harina o fécula de mandioca</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Salteado</h3>\n  <ul class=\"ingredientes\">\n    <li>Champiñones</li>\n    <li>Romero</li>\n    <li>Aceite</li>\n    <li>Sal</li>\n    <li>Cebolla morada picada</li>\n    <li>Manteca</li>\n    <li>Jugo de limón</li>\n    <li>Queso rallado</li>\n    <li>Ciboulette picado, para servir</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Triturar los arándanos con agua hasta obtener un líquido homogéneo.</li>\n    <li>Una vez triturados, agregar harina o fécula de mandioca hasta formar una masa.</li>\n    <li>Con esa masa, hacer los fideos caseros y cortarlos en tiras largas tipo spaghetti.</li>\n    <li>En una sartén, saltear los champiñones con romero, aceite y sal.</li>\n    <li>Agregar la cebolla morada picada y un poco de manteca, y saltear todo junto.</li>\n    <li>Incorporar el jugo de limón.</li>\n    <li>Hervir los fideos durante 10 minutos.</li>\n    <li>Agregar un poco del agua de cocción de la pasta a la sartén con los champiñones y la cebolla.</li>\n    <li>Incorporar la pasta ya hervida a la sartén y mezclar bien. Agregar un poco más de manteca.</li>\n    <li>Sumar el queso rallado y mezclar hasta integrar.</li>\n    <li>Servir con ciboulette picado por encima.</li>\n  </ol>\n</div>", "categoria": "Pastas y ñoquis"}, {"titulo": "Tarta de espárragos y gruyère", "img": "fotos/Tarta_de_esparragos_y_gruyere.jpg", "ingredientes": ["aceite de oliva", "aceto balsamico", "esparragos", "queso (general)", "queso gruyere", "queso parmesano"], "ingredientes_raw_canon": [[], ["queso gruyere", "queso (general)"], ["esparragos"], ["queso parmesano", "queso (general)"], ["aceto balsamico"], ["aceite de oliva"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Tarta de espárragos y gruyère</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Tarta_de_esparragos_y_gruyere.jpg\" alt=\"Tarta de espárragos y gruyère\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>1 plancha de masa de hojaldre congelada, descongelada (aproximadamente 240 g)</li>\n    <li>200 g de queso gruyère rallado</li>\n    <li>15 a 20 tallos de espárragos, sin las partes duras (aproximadamente 450 g)</li>\n    <li>30 g de queso parmesano rallado</li>\n    <li>1 cucharada de glaseado balsámico</li>\n    <li>Aceite de oliva, para rociar</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Precalentar el horno a 200 °C.</li>\n    <li>Sobre una superficie ligeramente enharinada, estirar la masa de hojaldre hasta obtener un rectángulo de aproximadamente 28 x 35 cm con la ayuda de un palote enharinado.</li>\n    <li>Pinchar la masa de hojaldre por completo con un tenedor.</li>\n    <li>Espolvorear el queso gruyère rallado de manera uniforme sobre la masa. Acomodar los tallos de espárragos en forma pareja sobre el queso, y luego espolvorear con el queso parmesano rallado. Rociar levemente con aceite de oliva.</li>\n    <li>Hornear durante 20 minutos, o hasta que el queso esté derretido y la tarta dorada.</li>\n    <li>Rociar con el glaseado balsámico antes de servir. Se recomienda servir de inmediato.</li>\n  </ol>\n</div>", "categoria": "Panes y tartas"}, {"titulo": "Mayonesa de huevo y zanahoria antiinflamatoria", "img": "fotos/Mayonesa_de_huevo_y_zanahoria_antiinflamatoria.jpg", "ingredientes": ["aceite de oliva", "agua", "ajo", "curcuma", "huevos", "limon", "pimenton", "sal", "semillas de chia", "zanahorias"], "ingredientes_raw_canon": [["huevos"], ["zanahorias"], ["aceite de oliva"], ["limon"], ["curcuma"], ["ajo"], ["sal"], ["semillas de chia", "agua"], ["pimenton"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Mayonesa de huevo y zanahoria antiinflamatoria</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Mayonesa_de_huevo_y_zanahoria_antiinflamatoria.jpg\" alt=\"Mayonesa de huevo y zanahoria antiinflamatoria\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>3 huevos duros</li>\n    <li>Zanahorias asadas al horno</li>\n    <li>Aceite de oliva</li>\n    <li>Jugo de limón</li>\n    <li>Cúrcuma en polvo</li>\n    <li>1 diente de ajo</li>\n    <li>Sal</li>\n    <li>Chía pudding (semillas de chía remojadas y activadas en agua caliente)</li>\n    <li>Pimentón, para espolvorear por encima</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Triturar los huevos duros junto con las zanahorias asadas, el aceite de oliva, el jugo de limón, la cúrcuma, el ajo y la sal hasta obtener una preparación cremosa.</li>\n    <li>Incorporar el chía pudding (las semillas de chía ya remojadas y activadas en agua caliente) y mezclar.</li>\n    <li>Servir espolvoreando pimentón por arriba, de la misma manera que se hace con el hummus.</li>\n  </ol>\n  <p class=\"nota\">Esta receta combina ingredientes con propiedades antiinflamatorias: la zanahoria es rica en betacaroteno, que protege células y tejidos; la cúrcuma ayuda a reducir la inflamación crónica; las semillas de chía aportan omega 3 y fibra que calman al cuerpo desde adentro; y el ajo contiene prebióticos como la inulina, que alimentan a las bacterias buenas del intestino, mejorando la digestión, la absorción de nutrientes y fortaleciendo el sistema inmune.</p>\n</div>", "categoria": "Dips y otros"}, {"titulo": "Mini cheesecakes con caramelo de pecanas", "img": "fotos/Mini_cheescackes_con_caramelo_de_pecanas.jpg", "ingredientes": ["azucar", "crema de leche", "esencia de vainilla", "galletitas", "manteca", "pecanas", "queso crema"], "ingredientes_raw_canon": [["crema de leche", "queso crema"], ["azucar"], ["crema de leche"], ["esencia de vainilla"], ["galletitas"], ["manteca"], ["manteca"], ["azucar"], ["esencia de vainilla"], ["crema de leche"], ["pecanas"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Mini cheesecakes con caramelo de pecanas</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Mini_cheescackes_con_caramelo_de_pecanas.jpg\" alt=\"Mini cheesecakes con caramelo de pecanas\">\n  </div>\n\n  <p class=\"nota\">Rinde 4 mini cheesecakes</p>\n\n  <h3 class=\"subtitulo\">Ingredientes — Cheesecake</h3>\n  <ul class=\"ingredientes\">\n    <li>375 g de queso crema</li>\n    <li>10 g de azúcar impalpable</li>\n    <li>150 ml de crema doble (double cream)</li>\n    <li>½ cucharadita de esencia de vainilla</li>\n    <li>130 g de galletitas digestive (o cualquier galletita simple)</li>\n    <li>35 g de manteca salada</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Pecanas caramelizadas</h3>\n  <ul class=\"ingredientes\">\n    <li>55 g de manteca</li>\n    <li>65 g de azúcar negra suave</li>\n    <li>½ cucharadita de esencia de vainilla</li>\n    <li>80 ml de crema doble (double cream), más cantidad extra para aflojar si fuera necesario</li>\n    <li>75 g de pecanas</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Triturar las galletitas hasta obtener migas finas, usando una procesadora o colocándolas en una bolsa y golpeándolas con un palote.</li>\n    <li>Derretir la manteca y mezclarla con las migas hasta que queden uniformemente cubiertas.</li>\n    <li>Dividir la mezcla entre cuatro vasitos o moldes individuales, presionando suavemente con el dorso de una cuchara para formar la base.</li>\n    <li>En un bowl grande, batir el queso crema, el azúcar impalpable y la esencia de vainilla hasta obtener una mezcla lisa y cremosa.</li>\n    <li>En otro bowl, batir la crema doble hasta que forme picos suaves.</li>\n    <li>Incorporar la crema batida a la mezcla de queso crema con movimientos envolventes.</li>\n    <li>Repartir el relleno sobre las bases de galletita, alisando la superficie. Llevar a la heladera hasta el momento de servir.</li>\n    <li>Para las pecanas caramelizadas, colocar la manteca y el azúcar negra en una cacerola pequeña a fuego medio. Revolver hasta que se derritan y se integren.</li>\n    <li>Agregar la vainilla y la crema, y cocinar 1 a 2 minutos, revolviendo, hasta que quede brillante y levemente espeso.</li>\n    <li>Incorporar las pecanas. Si la mezcla queda demasiado espesa, agregar un poco más de crema para aflojarla.</li>\n    <li>Servir el caramelo de pecanas tibio sobre cada cheesecake, al gusto de dulzor.</li>\n  </ol>\n</div>", "categoria": "Dulces y postres"}, {"titulo": "Banana pudding estilo Magnolia Bakery", "img": "fotos/Banana_pudding_estilo_Magnolia_Bakery.jpg", "ingredientes": ["agua", "banana", "crema de leche", "galletitas", "leche"], "ingredientes_raw_canon": [["leche"], ["agua"], [], ["leche", "crema de leche"], ["galletitas"], ["banana"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Banana pudding estilo Magnolia Bakery</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Banana_pudding_estilo_Magnolia_Bakery.jpg\" alt=\"Banana pudding estilo Magnolia Bakery\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>1 lata de leche condensada (aproximadamente 400 g)</li>\n    <li>1½ tazas de agua bien fría</li>\n    <li>1 paquete de mezcla instantánea para pudín de vainilla (aproximadamente 100 g)</li>\n    <li>3 tazas de crema de leche espesa fría</li>\n    <li>1 paquete de galletitas tipo vainilla (vanilla wafer)</li>\n    <li>4 a 5 bananas maduras, en rodajas</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>En el bowl de una batidora con el accesorio de batidor, batir la leche condensada y el agua a velocidad baja hasta integrar, luego subir a velocidad media y batir durante 1 minuto hasta que esté bien combinado.</li>\n    <li>Agregar la mezcla instantánea de pudín y batir durante 2 minutos, hasta que no queden grumos y la mezcla esté lisa. Pasar a un bowl mediano, tapar y refrigerar hasta que esté firme, al menos 1 hora o toda la noche.</li>\n    <li>Con la batidora y el accesorio de batidor, batir la crema de leche a velocidad media durante 1 minuto, hasta que empiece a espesar, luego subir a velocidad media-alta y batir hasta que se formen picos firmes. Tener cuidado de no batir de más.</li>\n    <li>Con la batidora a velocidad baja, agregar la mezcla de pudín de a una cucharada por vez. Mezclar hasta que esté bien integrado y no queden rayas de pudín.</li>\n    <li>Para armar, reservar 4 a 5 galletitas, enteras o desmenuzadas, para decorar. En un bowl de trifle de 4 a 5 litros o un bowl de vidrio ancho (o en 12 bowls individuales), distribuir un cuarto del pudín en la base y cubrir con un tercio de las galletitas y un tercio de las bananas en rodajas, lo suficiente para cubrir la capa.</li>\n    <li>Repetir el armado dos veces más. Terminar con una última capa de pudín por encima.</li>\n  </ol>\n</div>", "categoria": "Dulces y postres"}, {"titulo": "Budín marmolado de banana y mocha con glaseado de chocolate", "img": "REEMPLAZAR_budin_banana_mocha.jpg", "ingredientes": ["aceite vegetal", "azucar", "banana", "cacao", "cafe", "chocolate semiamargo/amargo", "crema de leche", "harina comun", "leche", "polvo de hornear", "sal", "yogur"], "ingredientes_raw_canon": [["banana"], ["aceite vegetal"], ["yogur"], ["azucar"], ["harina comun"], ["polvo de hornear"], ["cacao"], ["cafe"], ["chocolate semiamargo/amargo"], ["leche", "crema de leche"], ["cafe"], ["sal"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Budín marmolado de banana y mocha con glaseado de chocolate</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_budin_banana_mocha.jpg\" alt=\"Budín marmolado de banana y mocha con glaseado de chocolate\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes — Masa de banana</h3>\n  <ul class=\"ingredientes\">\n    <li>3 bananas maduras, pisadas</li>\n    <li>100 g de aceite vegetal</li>\n    <li>175 g de yogur sin lácteos (o yogur natural)</li>\n    <li>200 g de azúcar negra suave</li>\n    <li>300 g de harina leudante</li>\n    <li>1 cucharadita de polvo de hornear</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Masa mocha</h3>\n  <ul class=\"ingredientes\">\n    <li>35 g de cacao en polvo fino</li>\n    <li>60 g de café recién hecho</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Glaseado</h3>\n  <ul class=\"ingredientes\">\n    <li>200 g de chocolate amargo</li>\n    <li>200 g de crema doble sin lácteos (o crema de leche)</li>\n    <li>1 cucharadita de café instantáneo</li>\n    <li>Una pizca de sal, para terminar</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Precalentar el horno a 175 °C (función convección + ventilador).</li>\n    <li>Colocar el azúcar en un bowl y mezclar con el yogur y el aceite.</li>\n    <li>Incorporar los ingredientes secos con movimientos envolventes hasta casi integrar (la mezcla quedará muy seca en esta etapa).</li>\n    <li>Agregar la banana pisada con movimientos envolventes hasta obtener una mezcla espesa.</li>\n    <li>Dividir la mezcla entre dos bowls. Reservar uno aparte. En el otro bowl, agregar el cacao en polvo y el café, mezclando suavemente hasta integrar.</li>\n    <li>Forrar un molde de budín (2 libras). Colocar una cuchara de la masa de banana en el molde, seguida de una cuchara de la masa de chocolate. Repetir este proceso hasta terminar con toda la masa.</li>\n    <li>Hornear durante 50 a 60 minutos, o hasta que esté dorado y al insertar un cuchillo en el centro salga limpio.</li>\n    <li>Dejar enfriar por completo.</li>\n    <li>Una vez frío, preparar el glaseado calentando la crema hasta el punto de ebullición. Incorporar el café. Agregar el chocolate y dejar que se derrita durante 10 minutos antes de mezclar hasta obtener un glaseado liso.</li>\n    <li>Verter el glaseado sobre la parte superior de la torta ya fría, junto con una pizca de sal, y llevar a la heladera hasta que el glaseado cuaje.</li>\n  </ol>\n</div>", "categoria": "Dulces y postres"}, {"titulo": "Papas asadas con salsa de tahini, lima y chile crisp", "img": "REEMPLAZAR_papas_tahini_chilicrisp.jpg", "ingredientes": ["aceite de oliva", "ajo", "arroz", "cebolla de verdeo", "chile crisp/picante", "cilantro", "jengibre", "limon", "mayonesa", "papas/papines", "pimienta negra", "sal", "salsa de soja", "semillas de sesamo", "tahini", "vinagre de arroz", "yogur"], "ingredientes_raw_canon": [["papas/papines"], ["aceite de oliva", "sal", "pimienta negra"], ["mayonesa"], ["yogur"], ["tahini"], ["chile crisp/picante"], ["limon"], ["salsa de soja"], ["arroz", "vinagre de arroz"], ["ajo"], ["jengibre"], ["cebolla de verdeo"], ["cilantro"], ["semillas de sesamo"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Papas asadas con salsa de tahini, lima y chile crisp</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_papas_tahini_chilicrisp.jpg\" alt=\"Papas asadas con salsa de tahini, lima y chile crisp\">\n  </div>\n\n  <p class=\"nota\">Rinde 4 porciones como guarnición</p>\n\n  <h3 class=\"subtitulo\">Ingredientes — Papas</h3>\n  <ul class=\"ingredientes\">\n    <li>750 g de papas pequeñas (tipo Jersey Royal o papines)</li>\n    <li>Sal, pimienta y aceite de oliva</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Salsa</h3>\n  <ul class=\"ingredientes\">\n    <li>4 cucharadas de mayonesa</li>\n    <li>4 cucharadas de yogur griego</li>\n    <li>2 cucharadas de tahini</li>\n    <li>2 cucharaditas de chile crisp</li>\n    <li>1 lima (ralladura y jugo)</li>\n    <li>1 cucharada de salsa de soja</li>\n    <li>1 cucharada de vinagre de arroz</li>\n    <li>1 diente de ajo, picado</li>\n    <li>1 trozo de jengibre del tamaño de un pulgar, picado</li>\n    <li>2 cucharadas de cebolla de verdeo picada</li>\n    <li>2 cucharadas de cilantro fresco picado</li>\n    <li>1 cucharada de semillas de sésamo negras y blancas tostadas</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Hervir las papas en agua con sal hasta que estén tiernas.</li>\n    <li>Escurrir y, con la ayuda de un vaso o tenedor, aplastar levemente cada papa para romper la cáscara.</li>\n    <li>Condimentar con sal, pimienta y aceite de oliva.</li>\n    <li>Llevar al horno o a la parrilla hasta que estén doradas y crocantes por fuera.</li>\n    <li>Mientras tanto, preparar la salsa mezclando la mayonesa, el yogur griego, el tahini, el chile crisp, la ralladura y el jugo de lima, la salsa de soja, el vinagre de arroz, el ajo y el jengibre picados.</li>\n    <li>Servir las papas calientes bañadas con la salsa y finalizar con la cebolla de verdeo, el cilantro fresco y las semillas de sésamo tostadas por encima.</li>\n  </ol>\n  <p class=\"nota\">El detalle exacto del método de cocción de las papas no estaba disponible completo en la fuente original; esta preparación es una reconstrucción razonable a partir de los ingredientes y la descripción de la receta (papas hervidas, aplastadas, sazonadas y horneadas hasta quedar doradas y crocantes).</p>\n</div>", "categoria": "Vegetales y guarniciones"}, {"titulo": "Ensalada de arroz crispy con pollo y aderezo de limón y tahini", "img": "REEMPLAZAR_ensalada_arroz_pollo_tahini.jpg", "ingredientes": ["aceite de oliva", "ajo", "arroz", "canela", "cebolla", "comino", "curcuma", "jarabe de arce/miel", "limon", "menta", "miel", "oregano", "pepino", "pimenton", "pimienta negra", "pollo", "sal", "tahini", "tomates", "yogur"], "ingredientes_raw_canon": [["arroz"], ["aceite de oliva"], ["ajo", "pimenton", "oregano"], ["pollo"], ["aceite de oliva"], ["curcuma"], ["comino"], ["canela"], ["ajo"], ["pimienta negra"], ["pepino"], ["tomates"], ["cebolla"], ["pepino"], ["menta"], ["yogur"], ["tahini"], ["aceite de oliva"], ["limon"], ["ajo"], ["sal"], ["jarabe de arce/miel", "miel"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Ensalada de arroz crispy con pollo y aderezo de limón y tahini</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_ensalada_arroz_pollo_tahini.jpg\" alt=\"Ensalada de arroz crispy con pollo y aderezo de limón y tahini\">\n  </div>\n\n  <p class=\"nota\">Rinde 4 porciones grandes o 6 más chicas</p>\n\n  <h3 class=\"subtitulo\">Ingredientes — Arroz crocante</h3>\n  <ul class=\"ingredientes\">\n    <li>2 tazas de arroz cocido y frío (se puede usar arroz jazmín)</li>\n    <li>1 cucharada de aceite de oliva</li>\n    <li>1 cucharadita de pimentón, 1 cucharadita de orégano, ½ cucharadita de ajo en polvo</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Pollo</h3>\n  <ul class=\"ingredientes\">\n    <li>450 g de muslos de pollo deshuesados y sin piel, cortados en trozos de 1 cm</li>\n    <li>2 cucharadas de aceite de oliva</li>\n    <li>2 cucharaditas de cúrcuma molida</li>\n    <li>2 cucharaditas de comino</li>\n    <li>1 cucharadita de canela</li>\n    <li>1 cucharadita de ajo en polvo</li>\n    <li>½ cucharadita de pimienta negra</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Ensalada</h3>\n  <ul class=\"ingredientes\">\n    <li>5 pepinos persas, en rodajas finas</li>\n    <li>1 taza de tomates cherry, cortados por la mitad</li>\n    <li>½ cebolla morada, en rodajas finas</li>\n    <li>3 pickles de pepino encurtido, picados</li>\n    <li>1 atado de menta, picada</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Aderezo cremoso de limón y tahini</h3>\n  <ul class=\"ingredientes\">\n    <li>½ taza de yogur griego</li>\n    <li>⅓ taza de tahini</li>\n    <li>¼ taza de aceite de oliva</li>\n    <li>¼ taza de jugo de limón (aproximadamente 1 limón)</li>\n    <li>2 dientes de ajo</li>\n    <li>1 cucharadita de sal kosher</li>\n    <li>Opcional, para endulzar: 1 a 2 cucharadas de miel o jarabe de arce</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Preparar primero el arroz crocante. Precalentar el horno a 200 °C. Colocar el arroz cocido y frío sobre una placa para horno. Mezclar con el aceite de oliva y los condimentos.</li>\n    <li>Hornear durante 30 a 35 minutos, mezclando a mitad de cocción, vigilando que no se queme.</li>\n    <li>Mientras el arroz está en el horno, condimentar el pollo con el aceite y los condimentos, mezclando bien para que quede cubierto.</li>\n    <li>Calentar aceite de oliva en una sartén a fuego medio. Una vez caliente, agregar el pollo y cocinar hasta que esté bien cocido por completo. Retirar del fuego.</li>\n    <li>Retirar el arroz del horno y reservar.</li>\n    <li>Cortar y picar todos los ingredientes de la ensalada y colocarlos en un bowl grande. Agregar el pollo y el arroz crocante por encima.</li>\n    <li>Para el aderezo, procesar todos los ingredientes hasta que quede liso y cremoso. Probar y ajustar los condimentos si fuera necesario.</li>\n    <li>Verter el aderezo sobre la ensalada, mezclar y disfrutar.</li>\n  </ol>\n</div>", "categoria": "Pollo"}, {"titulo": "Fideos de papel de arroz con salsa de soja y sésamo", "img": "fotos/Fideos_de_papel_de_arroz_con_salsa_de_soja_y_sesamo.jpg", "ingredientes": ["aceite de oliva", "aceite vegetal", "arroz", "cebolla de verdeo", "chile crisp/picante", "salsa de soja", "semillas de sesamo", "vinagre de arroz"], "ingredientes_raw_canon": [["salsa de soja"], ["arroz", "vinagre de arroz"], ["semillas de sesamo"], ["semillas de sesamo"], ["arroz"], ["aceite de oliva"], ["cebolla de verdeo"], [], ["aceite vegetal", "chile crisp/picante"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Fideos de papel de arroz con salsa de soja y sésamo</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Fideos_de_papel_de_arroz_con_salsa_de_soja_y_sesamo.jpg\" alt=\"Fideos de papel de arroz con salsa de soja y sésamo\">\n  </div>\n\n  <p class=\"nota\">Rinde 2 porciones (como entrada o guarnición). Tiempo total: 25 minutos.</p>\n\n  <h3 class=\"subtitulo\">Ingredientes — Salsa</h3>\n  <ul class=\"ingredientes\">\n    <li>2 cucharadas de salsa de soja</li>\n    <li>1 cucharada de vinagre de arroz</li>\n    <li>2 cucharaditas de aceite de sésamo</li>\n    <li>2 cucharaditas de semillas de sésamo</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Fideos</h3>\n  <ul class=\"ingredientes\">\n    <li>9 láminas de papel de arroz</li>\n    <li>Aceite de oliva</li>\n    <li>1 cebolla de verdeo, en rodajas</li>\n    <li>½ chile rojo fresno chico, en rodajas finas</li>\n    <li>Aceite picante, para servir (opcional)</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Mezclar los ingredientes de la salsa y reservar.</li>\n    <li>Rociar una tabla de cortar con aceite y esparcirlo para cubrir bien la superficie. Llenar un bowl grande con agua.</li>\n    <li>Apilar de a tres láminas de papel de arroz por vez y remojarlas en el agua hasta que se ablanden (aproximadamente 45 segundos).</li>\n    <li>Escurrir y colocar en una sola lámina plana sobre la tabla, luego pincelar generosamente la parte superior con aceite de oliva (esto evita que los fideos se peguen una vez cortados).</li>\n    <li>Cortar en tiras de aproximadamente 2 cm de ancho y colocarlas con cuidado en un bowl. Repetir con los otros dos grupos de papel de arroz.</li>\n    <li>Agregar la salsa al bowl junto con la cebolla de verdeo y el chile rojo. Mezclar suavemente y servir con aceite picante por encima. ¡Listo!</li>\n  </ol>\n</div>", "categoria": "Vegetales y guarniciones"}, {"titulo": "Budín de remolacha con harina de trigo sarraceno", "img": "REEMPLAZAR_budin_remolacha_sarraceno.jpg", "ingredientes": ["aceite de oliva", "agua", "azucar", "harina de trigo sarraceno", "huevos", "levadura", "remolacha"], "ingredientes_raw_canon": [["harina de trigo sarraceno"], ["remolacha"], ["huevos"], ["aceite de oliva"], ["levadura"], ["azucar"], ["agua"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Budín de remolacha con harina de trigo sarraceno</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_budin_remolacha_sarraceno.jpg\" alt=\"Budín de remolacha con harina de trigo sarraceno\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>250 g de harina de trigo sarraceno</li>\n    <li>2 remolachas grandes</li>\n    <li>2 huevos</li>\n    <li>Aceite de oliva</li>\n    <li>Levadura seca</li>\n    <li>Una pizca de azúcar</li>\n    <li>Agua tibia</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Hervir las remolachas y licuarlas.</li>\n    <li>Activar la levadura seca en una taza con agua tibia y una pizca de azúcar.</li>\n    <li>Mezclar todo: el huevo, la harina, la levadura ya activada, las remolachas licuadas y una cucharada sopera de aceite de oliva.</li>\n    <li>La mezcla queda líquida pero espesa. Colocarla en un molde alargado rectangular previamente aceitado.</li>\n    <li>Hornear hasta que esté cocido por dentro y firme al tacto por fuera.</li>\n  </ol>\n</div>", "categoria": "Dulces y postres"}, {"titulo": "Muffins de banana y manteca de maní", "img": "fotos/Muffins_de_banana_y_manteca_de_mani.jpg", "ingredientes": ["avena", "banana", "esencia de vainilla", "huevos", "mani", "manteca de mani", "polvo de hornear"], "ingredientes_raw_canon": [["banana"], ["manteca de mani", "mani"], ["esencia de vainilla"], ["huevos"], ["avena"], ["polvo de hornear"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Muffins de banana y manteca de maní</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Muffins_de_banana_y_manteca_de_mani.jpg\" alt=\"Muffins de banana y manteca de maní\">\n  </div>\n\n  <p class=\"nota\">Rinde 4 muffins medianos. La receta se puede duplicar o triplicar según necesidad.</p>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>1 banana grande, pisada</li>\n    <li>⅓ taza de manteca de maní natural</li>\n    <li>½ cucharadita de esencia de vainilla pura</li>\n    <li>1 huevo grande</li>\n    <li>¾ taza de avena arrollada (puede ser de cocción rápida)</li>\n    <li>½ cucharadita de polvo de hornear</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Precalentar el horno y preparar un molde para muffins.</li>\n    <li>En un bowl, mezclar la banana pisada, la manteca de maní, la esencia de vainilla y el huevo hasta integrar bien.</li>\n    <li>Agregar la avena y el polvo de hornear, mezclando hasta obtener una masa homogénea.</li>\n    <li>Repartir la mezcla en 4 moldecitos de muffin.</li>\n    <li>Hornear hasta que estén dorados y firmes al tacto.</li>\n    <li>Servir tibios. Se pueden disfrutar con manteca salada y miel, o cubiertos con manteca de frutos secos o semillas extra, o mermelada.</li>\n  </ol>\n  <p class=\"nota\">Se pueden agregar rellenos a elección como frutos secos, frutillas u otras berries, o chips de chocolate.</p>\n</div>", "categoria": "Desayuno y meriendas"}, {"titulo": "Tarta con masa de chipa, relleno de calabaza, choclo y queso", "img": "REEMPLAZAR_tarta_masa_chipa.jpg", "ingredientes": ["aceite vegetal", "calabaza", "cebolla", "choclo/maiz", "fecula de maiz", "huevos", "leche", "miel", "queso (general)", "sal"], "ingredientes_raw_canon": [["fecula de maiz", "choclo/maiz"], ["queso (general)"], ["aceite vegetal"], ["huevos"], ["sal"], ["calabaza"], ["cebolla"], ["choclo/maiz"], [], ["fecula de maiz", "leche", "choclo/maiz"], ["queso (general)", "miel"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Tarta con masa de chipa, relleno de calabaza, choclo y queso</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_tarta_masa_chipa.jpg\" alt=\"Tarta con masa de chipa, relleno de calabaza, choclo y queso\">\n  </div>\n\n  <p class=\"nota\">Sin gluten</p>\n\n  <h3 class=\"subtitulo\">Ingredientes — Masa de chipa</h3>\n  <ul class=\"ingredientes\">\n    <li>200 g de almidón de maíz</li>\n    <li>200 g de queso (a elección)</li>\n    <li>100 g de aceite</li>\n    <li>2 huevos</li>\n    <li>Sal</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Relleno</h3>\n  <ul class=\"ingredientes\">\n    <li>1 calabaza</li>\n    <li>1 cebolla</li>\n    <li>1 lata de choclo</li>\n    <li>Condimentos a gusto</li>\n    <li>1 cucharada de almidón de maíz + 1 chorro de leche</li>\n    <li>Miel y quesito por encima (opcional)</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Para la masa, mezclar el almidón de maíz, el queso, el aceite, los huevos y la sal hasta formar una masa homogénea.</li>\n    <li>Estirar o presionar la masa en un molde para tarta, cubriendo la base y los bordes.</li>\n    <li>Para el relleno, cocinar la calabaza y la cebolla hasta que estén tiernas, y mezclar con el choclo escurrido y los condimentos a gusto.</li>\n    <li>Disolver la cucharada de almidón de maíz en el chorro de leche e incorporar al relleno para darle cremosidad.</li>\n    <li>Volcar el relleno sobre la masa de chipa.</li>\n    <li>Hornear hasta que la masa esté dorada y el relleno bien cocido.</li>\n    <li>Servir con un toque de miel y quesito por encima si se desea.</li>\n  </ol>\n</div>", "categoria": "Panes y tartas"}, {"titulo": "Pastrón casero con encurtido de repollo, por Tomás Kalika", "img": "REEMPLAZAR_pastron_casero.jpg", "ingredientes": ["agua", "aji molido/chile en polvo", "ajo", "anis estrella", "apio", "azucar", "caldo", "canela", "carne vacuna", "cebolla", "clavo de olor", "coriandro", "mostaza", "pimienta negra", "puerro", "ras el hanout", "repollo", "sal", "salitre", "semillas de mostaza", "vinagre", "vino tinto", "zanahorias"], "ingredientes_raw_canon": [["carne vacuna"], ["zanahorias"], ["apio"], ["puerro"], ["cebolla"], [], ["caldo"], ["vino tinto"], ["agua"], ["azucar"], ["salitre"], ["sal"], ["pimienta negra"], ["mostaza", "semillas de mostaza"], ["clavo de olor"], ["coriandro"], ["canela"], ["anis estrella"], ["aji molido/chile en polvo"], ["ras el hanout"], ["azucar"], ["repollo"], ["cebolla"], ["ajo"], ["mostaza", "semillas de mostaza"], ["pimienta negra"], ["vinagre"], ["agua"], ["azucar"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Pastrón casero con encurtido de repollo, por Tomás Kalika</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_pastron_casero.jpg\" alt=\"Pastrón casero con encurtido de repollo, por Tomás Kalika\">\n  </div>\n\n  <p class=\"nota\">Para 4 porciones</p>\n\n  <h3 class=\"subtitulo\">Ingredientes — Carne y guarnición</h3>\n  <ul class=\"ingredientes\">\n    <li>5 kg de tapa de asado</li>\n    <li>3 zanahorias</li>\n    <li>4 ramas de apio</li>\n    <li>4 puerros</li>\n    <li>4 cebollas</li>\n    <li>Hierbas frescas a gusto</li>\n    <li>250 cc de caldo</li>\n    <li>250 cc de vino tinto</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Salmuera</h3>\n  <ul class=\"ingredientes\">\n    <li>9 litros de agua</li>\n    <li>300 g de azúcar negra</li>\n    <li>60 g de salitre</li>\n    <li>300 g de sal</li>\n    <li>10 g de pimienta en grano</li>\n    <li>10 g de semillas de mostaza</li>\n    <li>10 g de clavo de olor</li>\n    <li>10 g de coriandro</li>\n    <li>5 g de canela</li>\n    <li>Anís estrella, a gusto</li>\n    <li>10 g de ají molido</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Pastrami mix</h3>\n  <ul class=\"ingredientes\">\n    <li>150 g de ras el hanout</li>\n    <li>150 g de azúcar negra</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Encurtido de repollo</h3>\n  <ul class=\"ingredientes\">\n    <li>Repollo blanco</li>\n    <li>Cebolla</li>\n    <li>Ajo machacado</li>\n    <li>Granos de mostaza</li>\n    <li>Pimienta</li>\n    <li>Vinagre</li>\n    <li>Agua</li>\n    <li>Azúcar</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación — Salmuera y curado</h3>\n  <ol class=\"preparacion\">\n    <li>Para la salmuera, en un bol colocar la pimienta, la sal, el azúcar negra, el salitre, las semillas de mostaza, el clavo de olor, el coriandro, la canela, el anís, el ají molido y el agua. Mezclar bien.</li>\n    <li>Sumergir la carne en la salmuera durante una semana, tapada y en la heladera, revolviendo cada 2 días.</li>\n    <li>Enjuagar bien la carne para eliminar el salitre.</li>\n  </ol>\n\n  <h3 class=\"subtitulo\">Preparación — Pastrami y cocción</h3>\n  <ol class=\"preparacion\">\n    <li>Para el pastrami mix, mixear las especias del ras el hanout y mezclar con el azúcar negra.</li>\n    <li>Cubrir la carne con esta mezcla y ahumarla en la parrilla, o bien en horno convector, durante 3 horas.</li>\n    <li>Llevar la carne al horno en una fuente, sobre una base de los vegetales picados gruesos, más el vino tinto y el caldo.</li>\n    <li>Tapar con papel aluminio y cocer en horno medio durante 3 horas más.</li>\n  </ol>\n\n  <h3 class=\"subtitulo\">Preparación — Encurtido de repollo</h3>\n  <ol class=\"preparacion\">\n    <li>Filetear la cebolla y el repollo blanco.</li>\n    <li>Colocar en una olla junto con el ajo machacado, los granos de mostaza y la pimienta.</li>\n    <li>Humectar con el vinagre y el agua, y agregar el azúcar.</li>\n    <li>Llevar a hervor y cocer durante 5 minutos.</li>\n  </ol>\n</div>", "categoria": "Carnes y pescados"}, {"titulo": "Bombones de pistacho y chocolate", "img": "fotos/Bombones_de_pistacho_y_chocolate.jpg", "ingredientes": ["aceite de coco", "castañas de caju", "chocolate semiamargo/amargo", "datiles", "leche de coco", "pistachos", "sal"], "ingredientes_raw_canon": [["leche de coco"], ["pistachos"], ["castañas de caju"], ["datiles"], [], ["pistachos"], ["aceite de coco", "chocolate semiamargo/amargo"], ["sal"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Bombones de pistacho y chocolate</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Bombones_de_pistacho_y_chocolate.jpg\" alt=\"Bombones de pistacho y chocolate\">\n  </div>\n\n  <p class=\"nota\">Un postre o snack saludable, delicioso y muy fácil de preparar.</p>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>125 g de crema de coco o leche de coco</li>\n    <li>80 g de pistachos</li>\n    <li>80 g de anacardos</li>\n    <li>5 a 6 dátiles sin hueso</li>\n    <li>1 cucharadita de aroma de vainilla</li>\n    <li>Pistachos troceados, para decorar</li>\n    <li>Chocolate negro del 85%, derretido con aceite de coco, para la cobertura</li>\n    <li>Sal, al gusto</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Procesar los pistachos, los anacardos y los dátiles junto con la crema de coco, el aroma de vainilla y una pizca de sal hasta obtener una pasta homogénea.</li>\n    <li>Formar bolitas con la mezcla y llevarlas al freezer o a la heladera unos minutos para que tomen firmeza.</li>\n    <li>Derretir el chocolate negro junto con el aceite de coco.</li>\n    <li>Bañar cada bolita con el chocolate derretido.</li>\n    <li>Decorar con pistachos troceados por encima.</li>\n    <li>Llevar a la heladera hasta que el chocolate se endurezca, y disfrutar.</li>\n  </ol>\n</div>", "categoria": "Dulces y postres"}, {"titulo": "Dátiles rellenos estilo tiramisú", "img": "REEMPLAZAR_datiles_tiramisu.jpg", "ingredientes": ["azucar", "cacao", "cafe", "datiles", "esencia de vainilla", "queso mascarpone"], "ingredientes_raw_canon": [["datiles"], ["queso mascarpone"], ["cafe"], ["esencia de vainilla"], ["azucar"], ["cacao"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Dátiles rellenos estilo tiramisú</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_datiles_tiramisu.jpg\" alt=\"Dátiles rellenos estilo tiramisú\">\n  </div>\n\n  <p class=\"nota\">Rinde 2 dátiles (receta fácilmente multiplicable)</p>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>2 dátiles Medjool</li>\n    <li>2 cucharadas de queso mascarpone</li>\n    <li>1 cucharadita de café espresso fuerte</li>\n    <li>¼ cucharadita de esencia de vainilla</li>\n    <li>1 cucharadita de azúcar impalpable</li>\n    <li>Cacao en polvo, para espolvorear</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Cortar cada dátil a lo largo de un lado y retirar el carozo, abriéndolo suavemente en forma de bote: un bolsillo limpio sostiene el relleno sin que el dátil se rompa.</li>\n    <li>Pincelar el interior de cada dátil con el café, ya que ese pequeño remojo es lo que le da el verdadero sabor a tiramisú.</li>\n    <li>Mezclar el mascarpone con la vainilla y el azúcar impalpable hasta que esté liso, y rellenar cada dátil con una cuchara o manga: un relleno generoso es lo que los hace saber a postre.</li>\n    <li>Espolvorear con cacao justo antes de servir, ya que el amargor del cacao equilibra el dulzor del dátil y le da el toque final de tiramisú.</li>\n  </ol>\n  <p class=\"nota\">Tiempo de preparación: 10 minutos, sin cocción.</p>\n</div>", "categoria": "Dulces y postres"}, {"titulo": "Dátiles rellenos estilo Bounty", "img": "REEMPLAZAR_datiles_bounty.jpg", "ingredientes": ["aceite de coco", "chocolate semiamargo/amargo", "coco rallado", "datiles", "jarabe de arce/miel"], "ingredientes_raw_canon": [["datiles"], ["coco rallado"], ["aceite de coco"], ["jarabe de arce/miel"], ["chocolate semiamargo/amargo"], ["coco rallado"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Dátiles rellenos estilo Bounty</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLA
