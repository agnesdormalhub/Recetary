<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recetario — qué puedo cocinar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #FBF5E9;
    --paper-2: #F3EBD9;
    --ink: #2B2620;
    --ink-soft: #5C5346;
    --line: #E2D6BC;
    --terracotta: #B5572E;
    --terracotta-deep: #8F421F;
    --olive: #5F6F3F;
    --olive-deep: #46532D;
    --gold: #C8983F;
    --card-shadow: 0 1px 0 rgba(43,38,32,0.05);
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    line-height: 1.55;
  }

  .wrap{
    max-width: 1080px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  /* ---------- HERO ---------- */
  .hero{
    padding: 56px 20px 28px;
    text-align: center;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(181,87,46,0.07), transparent 55%),
      radial-gradient(ellipse at 85% 10%, rgba(95,111,63,0.08), transparent 55%);
    border-bottom: 1px solid var(--line);
  }
  .hero-eyebrow{
    font-family:'Inter';
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--terracotta-deep);
    margin: 0 0 14px;
  }
  .hero h1{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(34px, 6vw, 56px);
    margin: 0 0 14px;
    letter-spacing: -0.5px;
  }
  .hero p{
    font-size: 16px;
    color: var(--ink-soft);
    max-width: 540px;
    margin: 0 auto;
  }

  /* ---------- LAYOUT ---------- */
  .layout{
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 36px;
    margin-top: 40px;
    align-items: start;
  }
  @media (max-width: 880px){
    .layout{ grid-template-columns: 1fr; }
  }

  /* ---------- PANTRY PANEL ---------- */
  .pantry{
    position: sticky;
    top: 20px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px 22px 18px;
    box-shadow: var(--card-shadow);
  }
  @media (max-width: 880px){
    .pantry{ position: static; }
  }
  .pantry h2{
    font-family:'Fraunces', serif;
    font-size: 21px;
    font-weight: 600;
    margin: 0 0 4px;
  }
  .pantry-sub{
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0 0 16px;
  }
  .pantry-search{
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 9px;
    font-size: 14px;
    font-family: 'Inter';
    background: var(--paper);
    color: var(--ink);
    margin-bottom: 14px;
  }
  .pantry-search:focus{
    outline: none;
    border-color: var(--olive);
  }
  .pantry-count{
    display:flex;
    align-items:center;
    justify-content: space-between;
    font-size: 12.5px;
    color: var(--ink-soft);
    margin-bottom: 12px;
  }
  .pantry-count button{
    background:none;
    border:none;
    color: var(--terracotta-deep);
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    padding: 0;
    font-family:'Inter';
  }
  .pantry-count button:hover{ text-decoration: underline; }

  .pantry-categories{
    max-height: 58vh;
    overflow-y: auto;
    padding-right: 6px;
  }
  .pantry-categories::-webkit-scrollbar{ width: 6px; }
  .pantry-categories::-webkit-scrollbar-thumb{ background: var(--line); border-radius: 4px; }

  .cat-block{ margin-bottom: 14px; }
  .cat-title{
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--olive-deep);
    margin: 0 0 8px;
  }
  .chip-grid{
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .chip{
    font-family:'Inter';
    font-size: 13px;
    padding: 6px 11px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ink-soft);
    cursor: pointer;
    transition: all .12s ease;
    user-select: none;
  }
  .chip:hover{ border-color: var(--olive); }
  .chip.active{
    background: var(--olive);
    border-color: var(--olive);
    color: #fff;
    font-weight: 500;
  }
  .chip.hidden{ display:none; }

  /* ---------- RESULTS ---------- */
  .results-head{
    display:flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 18px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .results-head h2{
    font-family:'Fraunces', serif;
    font-size: 22px;
    font-weight: 600;
    margin: 0;
  }
  .results-head .results-meta{
    font-size: 13px;
    color: var(--ink-soft);
  }

  .recipe-grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 18px;
  }

  .card{
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: transform .14s ease, box-shadow .14s ease;
    display: flex;
    flex-direction: column;
  }
  .card:hover{
    transform: translateY(-3px);
    box-shadow: 0 10px 24px rgba(43,38,32,0.10);
  }
  .card-img{
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    background: var(--paper-2);
    display:block;
  }
  .card-img.placeholder{
    display:flex;
    align-items:center;
    justify-content:center;
    color: var(--ink-soft);
    font-size: 12px;
    text-align: center;
    padding: 10px;
  }
  .card-body{
    padding: 14px 16px 16px;
    display:flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }
  .card-title{
    font-family:'Fraunces', serif;
    font-size: 17px;
    font-weight: 600;
    line-height: 1.3;
    margin: 0;
  }
  .match-row{
    display:flex;
    align-items:center;
    gap: 8px;
    margin-top: auto;
  }
  .match-bar{
    flex: 1;
    height: 6px;
    border-radius: 999px;
    background: var(--paper-2);
    overflow: hidden;
  }
  .match-bar-fill{
    height: 100%;
    border-radius: 999px;
    background: var(--olive);
  }
  .match-label{
    font-size: 12px;
    font-weight: 600;
    color: var(--olive-deep);
    white-space: nowrap;
  }
  .match-label.full{ color: var(--terracotta-deep); }
  .missing-line{
    font-size: 12px;
    color: var(--ink-soft);
  }
  .missing-line b{ color: var(--ink); font-weight: 600; }

  .empty-state{
    text-align:center;
    padding: 60px 20px;
    color: var(--ink-soft);
    border: 1px dashed var(--line);
    border-radius: 14px;
  }

  /* ---------- CATEGORY NAV & SECTIONS ---------- */
  .category-nav{
    display:flex;
    flex-wrap:wrap;
    gap: 8px;
    margin-bottom: 32px;
  }
  .cat-nav-chip{
    font-family:'Inter';
    font-size: 13px;
    padding: 7px 13px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink-soft);
    text-decoration: none;
    transition: all .12s ease;
  }
  .cat-nav-chip:hover{
    border-color: var(--olive);
    color: var(--olive-deep);
  }
  .category-section{
    margin-bottom: 44px;
    scroll-margin-top: 16px;
  }
  .category-section:last-child{
    margin-bottom: 0;
  }
  .category-section .results-head h2{
    font-size: 20px;
  }

  /* ---------- MODAL ---------- */
  .modal-backdrop{
    position: fixed;
    inset: 0;
    background: rgba(43,38,32,0.55);
    display:none;
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 24px;
  }
  .modal-backdrop.open{ display:flex; }
  .modal{
    background: var(--paper);
    border-radius: 16px;
    max-width: 720px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    padding: 36px 40px 44px;
    position: relative;
  }
  .modal-close{
    position: sticky;
    float: right;
    top: 0;
    margin-left: 12px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 999px;
    width: 34px;
    height: 34px;
    font-size: 16px;
    cursor: pointer;
    color: var(--ink-soft);
    line-height: 1;
  }
  .modal-close:hover{ color: var(--ink); }

  /* receta content (reusing original styles) */
  .modal h2.titulo-receta{
    font-family:'Fraunces', serif;
    font-size: 26px;
    font-weight: 600;
    margin: 0 0 20px;
    letter-spacing: 0.2px;
    padding-right: 40px;
  }
  .modal .imagen-plato img{
    width: 100%;
    max-width: 100%;
    height: auto;
    display: block;
    margin: 0 auto 28px auto;
    border-radius: 10px;
  }
  .modal .imagen-plato.placeholder{
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 10px;
    background: var(--paper-2);
    display:flex;
    align-items:center;
    justify-content:center;
    color: var(--ink-soft);
    font-size: 13px;
    margin-bottom: 28px;
  }
  .modal h3.subtitulo{
    font-family:'Inter';
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.4px;
    color: var(--olive-deep);
    margin-top: 26px;
    margin-bottom: 10px;
  }
  .modal ul.ingredientes{
    list-style: none;
    padding-left: 0;
    margin: 0 0 18px 0;
  }
  .modal ul.ingredientes li{
    padding: 6px 0;
    border-bottom: 1px solid var(--line);
    font-size: 15px;
  }
  .modal ul.ingredientes li.have{
    color: var(--olive-deep);
    font-weight: 500;
  }
  .modal ul.ingredientes li.have::before{
    content: "✓ ";
  }
  .modal ol.preparacion{
    padding-left: 22px;
    margin: 0;
  }
  .modal ol.preparacion li{
    padding: 6px 0;
    font-size: 15px;
  }
  .modal .nota{
    font-size: 14px;
    font-style: italic;
    color: var(--ink-soft);
    margin-top: 16px;
  }

  footer.credit{
    text-align:center;
    padding: 30px 0 10px;
    font-size: 12px;
    color: var(--ink-soft);
  }
</style>
</head>
<body>

<header class="hero">
  <p class="hero-eyebrow">Recetario personal</p>
  <h1>¿Qué hay en tu cocina?</h1>
  <p>Marcá los ingredientes que tenés a mano y te ordenamos las recetas según cuántas cosas te faltan comprar.</p>
</header>

<div class="wrap">
  <div class="layout">

    <aside class="pantry">
      <h2>Mi alacena</h2>
      <p class="pantry-sub">Tocá los ingredientes que tenés</p>
      <input id="pantrySearch" class="pantry-search" type="text" placeholder="Buscar ingrediente…">
      <div class="pantry-count">
        <span id="selectedCount">0 seleccionados</span>
        <button id="clearAll">Vaciar todo</button>
      </div>
      <div id="pantryCategories" class="pantry-categories"></div>
    </aside>

    <main>
      <div class="results-head">
        <h2 id="resultsTitle">Recetario completo</h2>
        <span class="results-meta" id="resultsMeta"></span>
      </div>
      <nav id="categoryNav" class="category-nav"></nav>
      <div id="recipeSections"></div>
    </main>

  </div>
</div>

<footer class="credit">Recetario — hecho con lo que hay en la heladera</footer>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modalContent"></div>
</div>

<script>
const APP_DATA = {"recetas": [{"titulo": "Blondies de chocolate blanco", "img": "fotos/1__Blondies_de_chocolate_blanco.webp", "ingredientes": ["almendras", "azucar", "chocolate blanco", "esencia de vainilla", "harina comun", "huevos", "manteca"], "ingredientes_raw_canon": [["chocolate blanco"], ["manteca"], ["huevos"], ["azucar"], ["esencia de vainilla"], ["harina comun"], ["almendras"], ["manteca", "harina comun"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Blondies de chocolate blanco</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/1__Blondies_de_chocolate_blanco.webp\" alt=\"Blondies de chocolate blanco\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>400 g de chocolate blanco</li>\n    <li>80 g de manteca</li>\n    <li>3 huevos</li>\n    <li>100 g de azúcar mascabo</li>\n    <li>2 cucharaditas de esencia de vainilla</li>\n    <li>230 g de harina común</li>\n    <li>80 g de almendras picadas</li>\n    <li>Manteca y harina extra para preparar el molde</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Picar el chocolate blanco y derretirlo a baño María o en el microondas, calentándolo en intervalos de 15 segundos y mezclando entre cada uno.</li>\n    <li>Derretir la manteca y reservar.</li>\n    <li>En un bowl, batir los huevos junto con el azúcar mascabo hasta integrar. Incorporar el chocolate blanco derretido y mezclar bien.</li>\n    <li>Agregar la esencia de vainilla.</li>\n    <li>Incorporar la harina común con movimientos envolventes hasta obtener una mezcla homogénea.</li>\n    <li>Añadir las almendras picadas y mezclar nuevamente con movimientos envolventes.</li>\n    <li>Verter la preparación en un molde previamente enmantecado y enharinado.</li>\n    <li>Hornear durante 20 minutos a 200 °C.</li>\n    <li>Al retirarlos del horno, los blondies pueden parecer ligeramente crudos en el centro. Es normal y deseable para lograr una textura húmeda y cremosa una vez que se enfríen. Dejar enfriar antes de cortar y servir.</li>\n  </ol>\n</div>", "categoria": "Dulces y postres"}, {"titulo": "Repollo al horno con salsa de maní, naranja y balsámico", "img": "fotos/2__Repollo_al_horno_con_salsa_de_mani.jpg", "ingredientes": ["aceite de oliva", "aceto balsamico", "ajo", "castañas de caju", "mani", "manteca de mani", "mostaza", "naranja", "perejil", "pimenton", "repollo", "sal"], "ingredientes_raw_canon": [["repollo"], ["manteca de mani", "mani"], ["naranja"], ["ajo"], ["perejil"], ["aceto balsamico"], ["mostaza"], ["pimenton"], ["aceite de oliva"], ["sal"], [], ["castañas de caju"], ["perejil"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Repollo al horno con salsa de maní, naranja y balsámico</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/2__Repollo_al_horno_con_salsa_de_mani.jpg\" alt=\"Repollo al horno con salsa de maní\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>1 repollo blanco entero</li>\n    <li>2 cucharadas colmadas de manteca de maní</li>\n    <li>Jugo de 1 naranja</li>\n    <li>2 dientes de ajo picados</li>\n    <li>1 cucharada de perejil fresco picado</li>\n    <li>2 cucharadas de aceto balsámico</li>\n    <li>½ cucharada de mostaza</li>\n    <li>1 cucharadita de pimentón</li>\n    <li>2 cucharadas de aceite de oliva</li>\n    <li>Sal, a gusto</li>\n    <li>Pasas rubias, para servir</li>\n    <li>Castañas de cajú, para servir</li>\n    <li>Perejil fresco picado, para servir</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Precalentar el horno a 200–220 °C.</li>\n    <li>Cortar el repollo en rodajas gruesas y disponerlas sobre una placa para horno ligeramente engrasada o cubierta con papel manteca.</li>\n    <li>En un bowl, mezclar la manteca de maní, el jugo de naranja, el ajo picado, el perejil, el aceto balsámico, la mostaza, el pimentón, el aceite de oliva y la sal hasta obtener una salsa homogénea.</li>\n    <li>Pincelar las rodajas de repollo con la mezcla de ambos lados.</li>\n    <li>Hornear durante aproximadamente 30 minutos, o hasta que el repollo esté dorado y tierno.</li>\n    <li>Retirar del horno y servir con pasas rubias, castañas de cajú y perejil fresco picado.</li>\n  </ol>\n  <p class=\"nota\">Las guarniciones pueden reemplazarse por otros frutos secos, algún ingrediente con un toque dulce y otra hierba aromática según preferencia.</p>\n</div>", "categoria": "Vegetales y guarniciones"}, {"titulo": "Pescado crocante con coco y salsa de mango", "img": "fotos/3__Pescado_crocante_con_coco_y_salsa_de_mango.jpeg", "ingredientes": ["aceite de oliva", "ajo", "azucar", "cebolla", "cilantro", "coco rallado", "comino", "huevos", "jalapeño", "limon", "mango", "pan rallado/panko", "pescado blanco", "pimenton", "pimienta negra", "sal", "tomates"], "ingredientes_raw_canon": [["pescado blanco"], ["huevos"], ["pan rallado/panko"], ["azucar", "coco rallado"], ["sal"], ["comino"], ["pimenton"], ["ajo"], ["pimienta negra"], ["aceite de oliva"], ["tomates"], ["mango"], ["cebolla"], ["jalapeño"], ["limon"], ["sal"], ["cilantro"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Pescado crocante con coco y salsa de mango</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/3__Pescado_crocante_con_coco_y_salsa_de_mango.jpeg\" alt=\"Pescado crocante con coco y salsa de mango\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes — Pescado</h3>\n  <ul class=\"ingredientes\">\n    <li>4 filetes de lenguado, bacalao o cualquier pescado blanco de preferencia</li>\n    <li>1 huevo grande</li>\n    <li>½ taza de pan rallado (tradicional o sin gluten)</li>\n    <li>½ taza de coco rallado fino sin azúcar</li>\n    <li>½ cucharadita de sal</li>\n    <li>½ cucharadita de comino</li>\n    <li>1 cucharadita de pimentón</li>\n    <li>1 cucharadita de ajo en polvo</li>\n    <li>¼ cucharadita de pimienta negra</li>\n    <li>Aceite de oliva, para rociar</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Salsa de mango</h3>\n  <ul class=\"ingredientes\">\n    <li>1 taza de tomates cherry picados</li>\n    <li>1 mango grande cortado en cubos</li>\n    <li>¼ de cebolla morada picada en cubos pequeños</li>\n    <li>1 jalapeño sin semillas, picado</li>\n    <li>Jugo de ½ lima o limón</li>\n    <li>¼ cucharadita de sal</li>\n    <li>Un puñado de cilantro fresco picado</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Precalentar el horno a 200 °C.</li>\n    <li>En un plato hondo o fuente baja, mezclar el pan rallado, el coco rallado, la sal, el comino, el pimentón, el ajo en polvo y la pimienta negra.</li>\n    <li>En un bowl aparte, batir el huevo. Incorporar los filetes de pescado y mezclar para que queden bien cubiertos.</li>\n    <li>Cubrir una placa para horno con papel manteca.</li>\n    <li>Pasar cada filete por la mezcla de pan rallado y coco, presionando suavemente para que se adhiera bien por ambos lados. Colocar los filetes sobre la placa y repetir el procedimiento con el resto.</li>\n    <li>Rociar cada pieza con un poco de aceite de oliva.</li>\n    <li>Hornear durante aproximadamente 15 minutos, o hasta que el pescado esté cocido y la cobertura dorada y crocante. El tiempo puede variar según el grosor de los filetes.</li>\n    <li>Mientras el pescado se cocina, preparar la salsa de mango mezclando en un bowl los tomates cherry, el mango, la cebolla morada, el jalapeño, el jugo de lima, la sal y el cilantro fresco.</li>\n    <li>Servir el pescado recién salido del horno con la salsa de mango por encima y acompañar con la guarnición de preferencia.</li>\n  </ol>\n</div>", "categoria": "Carnes y pescados"}, {"titulo": "Albóndigas de pollo con cuscús perlado al sartén", "img": "REEMPLAZAR_albondigas.jpg", "ingredientes": ["aceite de oliva", "agua", "ajo", "cebolla", "comino", "cuscus perlado/orzo", "huevos", "limon", "mostaza", "pan rallado/panko", "perejil", "pimienta negra", "pollo", "sal", "zucchini"], "ingredientes_raw_canon": [["pollo"], ["zucchini"], ["pan rallado/panko"], ["perejil"], ["huevos"], ["limon"], ["ajo"], ["sal"], ["pimienta negra"], ["comino"], ["cuscus perlado/orzo"], ["aceite de oliva"], ["cebolla"], ["zucchini"], ["agua"], ["mostaza"], ["perejil"], ["ajo"], ["sal"], ["pimienta negra"], ["limon"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Albóndigas de pollo con cuscús perlado al sartén</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_albondigas.jpg\" alt=\"Albóndigas de pollo con cuscús perlado\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes — Albóndigas</h3>\n  <ul class=\"ingredientes\">\n    <li>500–550 g de pollo picado</li>\n    <li>1 zucchini rallado (aproximadamente 1 taza), con el exceso de líquido escurrido</li>\n    <li>½ taza de pan rallado sin condimentar</li>\n    <li>½ taza de perejil fresco picado</li>\n    <li>1 huevo</li>\n    <li>1 cucharadita de ralladura de limón</li>\n    <li>1 cucharadita de ajo en polvo</li>\n    <li>½ cucharadita de sal</li>\n    <li>½ cucharadita de pimienta negra</li>\n    <li>¼ cucharadita de comino</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Cuscús perlado</h3>\n  <ul class=\"ingredientes\">\n    <li>1½ tazas de cuscús perlado</li>\n    <li>⅓ taza de aceite de oliva</li>\n    <li>1 cebolla amarilla mediana picada en cubos</li>\n    <li>1 zucchini cortado en cubos</li>\n    <li>3 tazas de agua</li>\n    <li>1 cucharada de mostaza Dijon</li>\n    <li>½ taza de perejil fresco picado</li>\n    <li>1 cucharadita de ajo en polvo</li>\n    <li>1 cucharadita de sal</li>\n    <li>½ cucharadita de pimienta negra</li>\n    <li>Jugo de limón, para servir</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Rallar el zucchini para las albóndigas y escurrir bien el exceso de líquido.</li>\n    <li>En un bowl grande, mezclar el pollo picado, el zucchini rallado, el pan rallado, el huevo, el perejil, la ralladura de limón, el ajo en polvo, la sal, la pimienta y el comino. Integrar bien con las manos hasta obtener una preparación homogénea.</li>\n    <li>Tomar porciones de aproximadamente 2 cucharadas y formar albóndigas del mismo tamaño.</li>\n    <li>Calentar una sartén amplia a fuego medio y agregar el aceite de oliva. Cuando esté caliente, cocinar las albóndigas durante aproximadamente 5 minutos de cada lado, hasta que estén doradas y cocidas. Retirar de la sartén y reservar.</li>\n    <li>En la misma sartén, incorporar la cebolla y el zucchini cortado en cubos. Cocinar entre 5 y 7 minutos, revolviendo ocasionalmente, hasta que estén tiernos.</li>\n    <li>Agregar el cuscús perlado, la mostaza Dijon, el ajo en polvo, la sal, la pimienta y el perejil. Mezclar bien para integrar los sabores.</li>\n    <li>Verter el agua y revolver. Acomodar nuevamente las albóndigas dentro de la sartén.</li>\n    <li>Tapar la sartén y llevar a ebullición. Una vez que hierva, reducir el fuego al mínimo y cocinar durante 30 a 35 minutos, hasta que el cuscús esté tierno y haya absorbido la mayor parte del líquido.</li>\n    <li>Retirar del fuego y dejar reposar durante 5 minutos.</li>\n    <li>Servir espolvoreado con perejil fresco picado y unas gotas de jugo de limón.</li>\n  </ol>\n</div>", "categoria": "Pollo"}, {"titulo": "Pollo marinado al chipotle y miel", "img": "REEMPLAZAR_pollo_chipotle.jpg", "ingredientes": ["aceite de oliva", "ajo", "cilantro", "comino", "limon", "miel", "palta", "pimenton", "pimienta negra", "pollo", "sal", "salsa adobo/chipotle"], "ingredientes_raw_canon": [["pollo"], ["salsa adobo/chipotle"], ["salsa adobo/chipotle"], ["miel"], ["limon"], ["comino"], ["pimenton"], ["ajo"], ["sal"], ["pimienta negra"], ["aceite de oliva", "palta"], ["cilantro"], ["limon"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Pollo marinado al chipotle y miel</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_pollo_chipotle.jpg\" alt=\"Pollo marinado al chipotle y miel\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>700–900 g de muslos de pollo deshuesados y sin piel (aproximadamente 8 piezas)</li>\n    <li>2 chiles chipotle en adobo</li>\n    <li>1 cucharada de salsa adobo</li>\n    <li>2 cucharadas de miel</li>\n    <li>Jugo de 1 lima o limón</li>\n    <li>1 cucharadita de comino</li>\n    <li>1 cucharadita de pimentón ahumado</li>\n    <li>½ cucharadita de ajo en polvo</li>\n    <li>½ cucharadita de sal</li>\n    <li>½ cucharadita de pimienta negra</li>\n    <li>¼ taza de aceite de oliva o de palta (aguacate), más cantidad adicional si fuera necesaria</li>\n    <li>Cilantro fresco picado, para servir</li>\n    <li>Gajos de lima o limón, para servir</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Preparar la marinada colocando en una licuadora, procesadora o utilizando una minipimer los chiles chipotle, la salsa adobo, la miel, el jugo de lima, el comino, el pimentón ahumado, el ajo en polvo, la sal y la pimienta. Procesar hasta obtener una mezcla homogénea.</li>\n    <li>Colocar los muslos de pollo en un bowl y cubrir con aproximadamente tres cuartas partes de la marinada, reservando unas 2 cucharadas para el final. Mezclar bien para que todas las piezas queden impregnadas.</li>\n    <li>Dejar marinar durante al menos 20 a 30 minutos. Si se prepara con anticipación, puede marinarse entre 1 y 2 horas para intensificar el sabor.</li>\n    <li>Calentar una sartén grande a fuego medio y agregar el aceite.</li>\n    <li>Cuando el aceite esté caliente, incorporar el pollo y cocinar durante 15 a 20 minutos en total, girándolo a mitad de cocción para que se dore de manera uniforme.</li>\n    <li>Al dar vuelta las piezas, pincelarlas con parte de la marinada reservada.</li>\n    <li>Si se cocina en tandas, agregar un poco más de aceite a la sartén cuando sea necesario.</li>\n    <li>Retirar del fuego una vez que el pollo esté bien cocido y dorado.</li>\n    <li>Servir acompañado de cilantro fresco picado y unas gotas de jugo de lima o limón.</li>\n  </ol>\n</div>", "categoria": "Pollo"}, {"titulo": "Carne picada con cuscús perlado y garbanzos", "img": "REEMPLAZAR_cuscus_carne.jpg", "ingredientes": ["aceite de oliva", "agua", "carne vacuna", "cebolla", "comino", "curcuma", "cuscus perlado/orzo", "garbanzos", "perejil", "pimenton", "pimienta negra", "sal", "tomates", "zanahorias"], "ingredientes_raw_canon": [["carne vacuna"], ["cuscus perlado/orzo"], ["agua"], ["cebolla"], ["zanahorias"], ["garbanzos"], ["aceite de oliva"], ["perejil"], ["tomates"], ["pimenton"], ["sal"], ["pimienta negra"], ["comino"], ["curcuma"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Carne picada con cuscús perlado y garbanzos</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_cuscus_carne.jpg\" alt=\"Carne picada con cuscús perlado y garbanzos\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>450 g de carne vacuna picada</li>\n    <li>1½ tazas de cuscús perlado</li>\n    <li>2 tazas de agua</li>\n    <li>1 cebolla amarilla mediana picada en cubos</li>\n    <li>2 zanahorias peladas y ralladas</li>\n    <li>1 lata de garbanzos (aproximadamente 425 g), escurridos</li>\n    <li>¼ taza de aceite de oliva</li>\n    <li>½ taza de perejil fresco picado</li>\n    <li>1 cucharada de extracto de tomate</li>\n    <li>2 cucharaditas de pimentón</li>\n    <li>1½ cucharaditas de sal</li>\n    <li>1 cucharadita de pimienta negra</li>\n    <li>1 cucharadita de comino</li>\n    <li>¼ cucharadita de cúrcuma</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Calentar una olla a fuego medio y agregar el aceite de oliva.</li>\n    <li>Incorporar la cebolla picada y cocinar durante aproximadamente 5 minutos, hasta que esté tierna y translúcida.</li>\n    <li>Agregar la carne picada, desmenuzándola con una cuchara mientras se cocina. Cocinar entre 7 y 10 minutos, revolviendo ocasionalmente, hasta que la carne esté dorada.</li>\n    <li>Incorporar el pimentón, la sal, la pimienta, el comino, la cúrcuma y el extracto de tomate. Mezclar bien para distribuir los condimentos.</li>\n    <li>Añadir los garbanzos escurridos, las zanahorias ralladas, el cuscús perlado y el perejil picado. Mezclar hasta integrar todos los ingredientes.</li>\n    <li>Verter las 2 tazas de agua y revolver nuevamente.</li>\n    <li>Tapar la olla y llevar a ebullición. Cuando hierva, reducir el fuego al mínimo y cocinar durante 20 minutos, hasta que el cuscús esté tierno y haya absorbido el líquido.</li>\n    <li>Retirar del fuego y soltar el cuscús con un tenedor.</li>\n    <li>Servir caliente, acompañado con perejil fresco picado adicional por encima.</li>\n  </ol>\n</div>", "categoria": "Carnes y pescados"}, {"titulo": "Pollo al curry rojo tailandés con garbanzos y leche de coco", "img": "REEMPLAZAR_curry_pollo.jpg", "ingredientes": ["aceite de oliva", "ajo", "azucar", "cebolla de verdeo", "cilantro", "garbanzos", "jengibre", "leche de coco", "limon", "morron", "pasta de curry", "pimienta negra", "pollo", "sal", "salsa de soja"], "ingredientes_raw_canon": [["pollo"], ["leche de coco"], ["garbanzos"], ["morron"], ["cebolla de verdeo"], ["pasta de curry"], ["salsa de soja"], ["jengibre"], ["ajo"], ["azucar"], ["limon"], ["aceite de oliva"], ["sal", "pimienta negra"], ["cilantro"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Pollo al curry rojo tailandés con garbanzos y leche de coco</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_curry_pollo.jpg\" alt=\"Pollo al curry rojo tailandés con garbanzos y leche de coco\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>700 g de pechuga de pollo deshuesada, cortada en cubos</li>\n    <li>1 lata de leche de coco entera (400 ml aproximadamente)</li>\n    <li>1 lata de garbanzos (aproximadamente 425 g), escurridos</li>\n    <li>1 morrón rojo cortado en tiras</li>\n    <li>2 echalotes (shallots) picados en cubos pequeños</li>\n    <li>2 cucharadas de pasta de curry rojo tailandés</li>\n    <li>2 cucharadas de salsa de soja o aminoácidos de coco (para versión sin gluten)</li>\n    <li>2 cucharaditas de jengibre fresco rallado</li>\n    <li>2 cucharaditas de ajo rallado o picado finamente</li>\n    <li>1 cucharadita de azúcar de coco o azúcar negra</li>\n    <li>1 lima o limón verde, mitad exprimida y mitad cortada en rodajas</li>\n    <li>Aceite de oliva</li>\n    <li>Sal y pimienta negra, a gusto</li>\n    <li>Cilantro fresco picado, para servir</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Cortar la pechuga de pollo en cubos de aproximadamente 2,5 cm. Condimentar con sal y pimienta y reservar.</li>\n    <li>Calentar una sartén amplia o una cacerola baja a fuego medio y agregar aproximadamente ¼ taza de aceite de oliva.</li>\n    <li>Incorporar los echalotes y cocinar durante 3 a 4 minutos, hasta que comiencen a dorarse.</li>\n    <li>Agregar el ajo rallado, el jengibre, el pollo y las tiras de morrón rojo. Cocinar a fuego medio-alto durante 12 a 15 minutos, revolviendo ocasionalmente, hasta que el pollo esté dorado.</li>\n    <li>Incorporar los garbanzos, la pasta de curry rojo, la salsa de soja y el azúcar. Mezclar bien para integrar todos los ingredientes.</li>\n    <li>Verter la leche de coco y añadir una pizca adicional de sal si fuera necesario.</li>\n    <li>Tapar la sartén y llevar la preparación a ebullición. Una vez que hierva, reducir el fuego al mínimo y cocinar durante 15 minutos para que los sabores se integren y la salsa espese ligeramente.</li>\n    <li>Retirar del fuego y agregar el jugo de media lima o limón.</li>\n    <li>Servir decorado con rodajas de lima y cilantro fresco picado. Puede acompañarse con arroz blanco, arroz jazmín o vegetales salteados.</li>\n  </ol>\n</div>", "categoria": "Pollo"}, {"titulo": "Torta de chocolate con cobertura crocante de Nutella y copos de maíz", "img": "fotos/Torta_de_chocolate_con_cobertura_crocante_de_Nutella_y_copos_de_maiz.jpg", "ingredientes": ["aceite vegetal", "azucar", "bicarbonato de sodio", "cacao", "cafe", "choclo/maiz", "chocolate semiamargo/amargo", "crema de leche", "harina comun", "huevos", "leche", "pasta de avellanas y chocolate (nutella)", "polvo de hornear", "sal"], "ingredientes_raw_canon": [["aceite vegetal"], ["azucar"], ["cacao"], ["polvo de hornear"], ["bicarbonato de sodio"], ["sal"], ["cafe"], ["aceite vegetal"], ["crema de leche"], ["huevos"], ["harina comun"], ["leche", "crema de leche"], ["pasta de avellanas y chocolate (nutella)"], ["pasta de avellanas y chocolate (nutella)"], ["sal"], ["chocolate semiamargo/amargo"], ["choclo/maiz"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Torta de chocolate con cobertura crocante de Nutella y copos de maíz</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Torta_de_chocolate_con_cobertura_crocante_de_Nutella_y_copos_de_maiz.jpg\" alt=\"Torta de chocolate con cobertura de Nutella y copos de maíz\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes — Torta</h3>\n  <ul class=\"ingredientes\">\n    <li>Aceite de girasol o vegetal, para engrasar el molde</li>\n    <li>¾ taza (156 g) de azúcar</li>\n    <li>½ taza (50 g) de cacao amargo tipo Dutch-process</li>\n    <li>¾ cucharadita de polvo de hornear</li>\n    <li>¼ cucharadita de bicarbonato de sodio</li>\n    <li>¼ cucharadita de sal kosher</li>\n    <li>¼ taza (44 g) de café caliente recién preparado</li>\n    <li>⅓ taza (64 g) de aceite de girasol o vegetal</li>\n    <li>⅓ taza (80 g) de crema agria (sour cream)</li>\n    <li>1 huevo grande</li>\n    <li>⅔ taza (88 g) de harina común</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Cobertura</h3>\n  <ul class=\"ingredientes\">\n    <li>⅓ taza (76 g) de crema de leche</li>\n    <li>⅓ taza (105 g) de pasta de avellanas y chocolate (Nutella o similar)</li>\n    <li>½ taza (158 g) adicional de pasta de avellanas y chocolate</li>\n    <li>½ cucharadita de sal kosher, dividida</li>\n    <li>60 g de chocolate semiamargo</li>\n    <li>2½ tazas (100 g) de copos de maíz (cornflakes) ligeramente triturados</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación — Torta</h3>\n  <ol class=\"preparacion\">\n    <li>Precalentar el horno a 180 °C.</li>\n    <li>Engrasar ligeramente un molde redondo de 20 cm de diámetro con aceite.</li>\n    <li>En un bowl grande, mezclar el azúcar, el cacao, el polvo de hornear, el bicarbonato y la sal.</li>\n    <li>Agregar el café caliente y batir hasta integrar. Este paso ayuda a hidratar el cacao y potenciar su sabor.</li>\n    <li>Incorporar el aceite, la crema agria y el huevo. Batir hasta obtener una mezcla lisa y homogénea.</li>\n    <li>Añadir la harina y mezclar únicamente hasta que desaparezcan los rastros de harina seca.</li>\n    <li>Volcar la preparación en el molde y distribuir de manera uniforme.</li>\n    <li>Hornear entre 25 y 35 minutos, o hasta que al insertar un palillo en el centro salga limpio.</li>\n    <li>Retirar del horno y dejar enfriar completamente dentro del molde.</li>\n  </ol>\n\n  <h3 class=\"subtitulo\">Preparación — Cobertura</h3>\n  <ol class=\"preparacion\">\n    <li>Calentar la crema de leche en un bowl apto para microondas hasta que comience a humear y aparezcan pequeñas burbujas en los bordes. También puede calentarse en una cacerola pequeña hasta apenas hervir.</li>\n    <li>Agregar ⅓ taza de pasta de avellanas y chocolate junto con ¼ cucharadita de sal. Mezclar hasta obtener una crema lisa.</li>\n    <li>Verter esta preparación sobre la torta fría, distribuyéndola de manera uniforme.</li>\n    <li>En el mismo bowl, derretir el chocolate semiamargo en intervalos cortos de microondas, mezclando entre cada uno, hasta que esté completamente fundido.</li>\n    <li>Agregar la ½ taza restante de pasta de avellanas y chocolate y los ¼ cucharadita de sal restantes. Mezclar hasta integrar.</li>\n    <li>Incorporar los copos de maíz triturados y mezclar hasta que queden completamente cubiertos por el chocolate.</li>\n    <li>Distribuir la mezcla sobre la superficie de la torta, formando una capa uniforme con ayuda del dorso de una cuchara.</li>\n    <li>Servir inmediatamente para disfrutar la cobertura aún cremosa y crocante.</li>\n  </ol>\n\n  <p class=\"nota\">Conservación: la torta puede conservarse tapada de manera ligera a temperatura ambiente fresca durante hasta 2 días.</p>\n  <p class=\"nota\">Variaciones: los copos de maíz pueden reemplazarse por aproximadamente 24 barquillos rellenos de chocolate triturados (la cobertura quedará un poco más dulce y delicada). Para una cobertura menos dulce, omitir la ½ taza adicional de pasta de avellanas, derretir 170 g de chocolate semiamargo junto con 2 cucharadas de manteca sin sal, agregar ¼ cucharadita de sal, mezclar con los copos de maíz y utilizar como cobertura.</p>\n</div>", "categoria": "Dulces y postres"}, {"titulo": "Maíz a la parrilla con mayonesa, lima y queso", "img": "fotos/Maiz_a_la_parrilla_con_mayonesa__lima_y_queso.jpg", "ingredientes": ["aji molido/chile en polvo", "choclo/maiz", "cilantro", "mayonesa", "pimienta negra", "queso (general)", "queso cotija/feta", "sal"], "ingredientes_raw_canon": [["choclo/maiz"], ["mayonesa"], [], ["aji molido/chile en polvo"], ["sal"], ["pimienta negra"], ["queso cotija/feta", "queso (general)"], ["cilantro"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Maíz a la parrilla con mayonesa, lima y queso</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Maiz_a_la_parrilla_con_mayonesa__lima_y_queso.jpg\" alt=\"Maíz a la parrilla con mayonesa, lima y queso\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>6 choclos frescos, pelados</li>\n    <li>3 cucharadas de mayonesa</li>\n    <li>2 limas o limones verdes</li>\n    <li>¼ cucharadita de chile ancho en polvo (o ají molido suave), más cantidad a gusto</li>\n    <li>Sal fina, a gusto</li>\n    <li>Pimienta negra, a gusto</li>\n    <li>½ taza de queso Cotija desgranado (puede reemplazarse por queso feta o ricota salata)</li>\n    <li>¼ taza de cilantro fresco picado</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Precalentar la parrilla o grill a fuego medio-alto.</li>\n    <li>Cocinar los choclos sobre la parrilla, girándolos ocasionalmente, hasta que estén tiernos y ligeramente dorados o tostados. Este proceso lleva aproximadamente entre 7 y 10 minutos.</li>\n    <li>Mientras tanto, en un bowl pequeño, mezclar la mayonesa, la ralladura de una lima, el chile ancho en polvo, sal y pimienta.</li>\n    <li>Una vez cocidos, untar los choclos calientes con la mezcla de mayonesa de manera uniforme.</li>\n    <li>Espolvorear por encima el queso desgranado y el cilantro fresco picado.</li>\n    <li>Cortar las limas restantes en gajos y servir junto a los choclos para exprimir al gusto antes de comer.</li>\n  </ol>\n</div>", "categoria": "Vegetales y guarniciones"}, {"titulo": "Berenjenas asadas rellenas con ricota y cebollas caramelizadas especiadas", "img": "fotos/Berenjenas_asadas_rellenas_con_ricota_y_cebollas_caramelizadas_especiadas.jpg", "ingredientes": ["aceite de oliva", "ajo", "berenjenas", "cebolla", "cebolla de verdeo", "halloumi", "jarabe de arce/miel", "miel", "nueces", "perejil", "pimenton", "pimienta negra", "queso (general)", "queso parmesano", "ricota", "sal", "semillas de alcaravea", "vinagre de manzana"], "ingredientes_raw_canon": [["berenjenas"], ["ricota"], ["queso parmesano", "halloumi", "queso (general)"], ["ajo"], ["cebolla de verdeo"], ["perejil"], ["nueces"], ["sal"], ["pimienta negra"], ["aceite de oliva"], ["cebolla"], ["vinagre de manzana"], ["jarabe de arce/miel", "miel"], ["semillas de alcaravea"], ["pimenton"], ["sal"], ["pimienta negra"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Berenjenas asadas rellenas con ricota y cebollas caramelizadas especiadas</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Berenjenas_asadas_rellenas_con_ricota_y_cebollas_caramelizadas_especiadas.jpg\" alt=\"Berenjenas asadas rellenas con ricota y cebollas caramelizadas\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes — Berenjenas</h3>\n  <ul class=\"ingredientes\">\n    <li>4 berenjenas medianas (aproximadamente 900 g)</li>\n    <li>½ taza (115 g) de ricota entera, a temperatura ambiente</li>\n    <li>½ taza de halloumi rallado fino o queso parmesano rallado (aproximadamente 60 g)</li>\n    <li>1 diente de ajo pequeño, rallado o picado muy fino</li>\n    <li>2 cebollas de verdeo, finamente picadas</li>\n    <li>1 cucharada de perejil fresco picado</li>\n    <li>3 cucharadas de nueces tostadas y picadas finamente</li>\n    <li>Sal fina, a gusto</li>\n    <li>Pimienta negra recién molida, a gusto</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Cebollas caramelizadas especiadas</h3>\n  <ul class=\"ingredientes\">\n    <li>¼ taza de aceite de oliva</li>\n    <li>2 cebollas amarillas medianas, picadas finamente</li>\n    <li>2 cucharadas de vinagre de manzana</li>\n    <li>2 cucharaditas de jarabe de arce (maple syrup) o miel suave</li>\n    <li>2½ cucharaditas de semillas de alcaravea (caraway), ligeramente machacadas</li>\n    <li>1½ cucharaditas de pimentón</li>\n    <li>Sal fina, a gusto</li>\n    <li>Pimienta negra, a gusto</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Precalentar el horno a 200 °C.</li>\n    <li>Pinchar las berenjenas varias veces con un tenedor y colocarlas sobre una placa para horno cubierta con papel manteca.</li>\n    <li>Hornear durante 45 a 50 minutos, hasta que estén muy tiernas, ligeramente colapsadas y cocidas por completo en el centro.</li>\n    <li>Mientras tanto, preparar las cebollas caramelizadas.</li>\n    <li>Calentar el aceite de oliva en una sartén a fuego medio-alto. Agregar las cebollas junto con una pizca de sal y cocinar durante aproximadamente 7 minutos, revolviendo ocasionalmente, hasta que estén tiernas y comiencen a dorarse.</li>\n    <li>Incorporar el vinagre de manzana, el jarabe de arce, las semillas de alcaravea y el pimentón.</li>\n    <li>Reducir el fuego a medio y continuar la cocción durante unos 7 minutos más, revolviendo de vez en cuando, hasta obtener una textura suave, brillante y ligeramente untuosa, similar a una mermelada.</li>\n    <li>Retirar las berenjenas del horno y dejar enfriar unos minutos hasta poder manipularlas.</li>\n    <li>Con un cuchillo pequeño y afilado, realizar un corte longitudinal en cada berenjena sin llegar a separarlas por completo, abriéndolas como una papa al horno.</li>\n    <li>Colocarlas en un colador durante aproximadamente 5 minutos para que eliminen el exceso de líquido.</li>\n    <li>En un bowl, mezclar la ricota, el halloumi o parmesano, el ajo, una pizca de sal y abundante pimienta negra.</li>\n    <li>Para servir, disponer las berenjenas abiertas sobre una fuente.</li>\n    <li>Condimentar el interior con sal y pimienta.</li>\n    <li>Agregar dos cucharadas generosas de la mezcla de ricota sobre cada berenjena.</li>\n    <li>Cubrir con las cebollas caramelizadas especiadas.</li>\n    <li>Finalizar con la cebolla de verdeo, el perejil fresco y las nueces tostadas.</li>\n    <li>Si se desea, rociar con un poco más de aceite de oliva antes de servir.</li>\n    <li>Servir tibias o a temperatura ambiente.</li>\n  </ol>\n</div>", "categoria": "Vegetales y guarniciones"}, {"titulo": "Ñoquis de papa con espárragos y salsa cremosa de limón y parmesano", "img": "fotos/Ñoquis_de_papa_con_esparragos_y_salsa_cremosa_de_limon_y_parmesano.jpg", "ingredientes": ["aceite de oliva", "caldo", "crema de leche", "esparragos", "leche", "limon", "manteca", "pasta/fideos", "pimienta negra", "pollo", "queso (general)", "queso parmesano", "sal"], "ingredientes_raw_canon": [["limon"], ["aceite de oliva"], ["pasta/fideos"], ["esparragos"], ["sal"], ["manteca"], ["leche", "crema de leche"], ["pollo", "caldo"], ["pimienta negra"], ["queso parmesano", "queso (general)"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Ñoquis de papa con espárragos y salsa cremosa de limón y parmesano</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Ñoquis_de_papa_con_esparragos_y_salsa_cremosa_de_limon_y_parmesano.jpg\" alt=\"Ñoquis de papa con espárragos y salsa de limón y parmesano\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>1 limón grande</li>\n    <li>1 cucharada de aceite de oliva</li>\n    <li>1 paquete de ñoquis de papa listos para cocinar (450–500 g aproximadamente)</li>\n    <li>1 atado de espárragos (aproximadamente 450 g), sin las partes duras y cortados en trozos de 1 cm</li>\n    <li>Sal kosher o sal fina, a gusto</li>\n    <li>1 cucharada de manteca</li>\n    <li>¾ taza de crema de leche</li>\n    <li>¾ taza de caldo de verduras o de pollo bajo en sodio</li>\n    <li>Pimienta negra recién molida, a gusto</li>\n    <li>¼ taza de queso parmesano rallado, más cantidad adicional para servir</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Rallar la cáscara del limón hasta obtener aproximadamente 1 cucharada de ralladura.</li>\n    <li>Exprimir el limón y reservar 1½ cucharadas de jugo.</li>\n    <li>Calentar una sartén grande antiadherente a fuego medio y agregar el aceite de oliva.</li>\n    <li>Incorporar los ñoquis en una sola capa, separándolos si estuvieran pegados entre sí.</li>\n    <li>Tapar la sartén y cocinar sin mover durante 5 a 7 minutos, hasta que la base esté dorada y crocante.</li>\n    <li>Agregar los espárragos y una pizca de sal. Mezclar suavemente.</li>\n    <li>Volver a tapar y cocinar durante 2 a 3 minutos más, revolviendo una vez a mitad de cocción, hasta que los espárragos estén tiernos pero aún crocantes y de color verde brillante.</li>\n    <li>Retirar los ñoquis y los espárragos de la sartén y reservar.</li>\n    <li>Si es necesario, limpiar rápidamente la sartén y volver a colocarla sobre el fuego medio.</li>\n    <li>Agregar la manteca y dejar que se derrita.</li>\n    <li>Incorporar la mitad de la ralladura de limón y cocinar durante 15 a 30 segundos, revolviendo constantemente, hasta que desprenda su aroma.</li>\n    <li>Añadir la crema de leche, el caldo, ¼ cucharadita de sal y ¼ cucharadita de pimienta.</li>\n    <li>Llevar a hervor suave a fuego medio-alto y cocinar durante 2 a 3 minutos, hasta que la salsa reduzca ligeramente y cubra tenuemente el dorso de una cuchara.</li>\n    <li>Agregar el queso parmesano rallado mientras se mezcla continuamente hasta que se funda e integre.</li>\n    <li>Volver a incorporar los ñoquis y los espárragos a la sartén.</li>\n    <li>Mezclar bien y cocinar durante 1½ a 3 minutos más, manteniendo un hervor suave, hasta que la salsa espese y se adhiera a los ñoquis.</li>\n    <li>Retirar del fuego.</li>\n    <li>Agregar el resto de la ralladura de limón y el jugo reservado, mezclando constantemente. La salsa se volverá más sedosa y adquirirá una textura más cremosa.</li>\n    <li>Probar y ajustar la sal y la pimienta si fuera necesario.</li>\n    <li>Servir de inmediato con queso parmesano rallado adicional y pimienta negra recién molida por encima.</li>\n  </ol>\n  <p class=\"nota\">Nota: si se desea un sabor más intenso a limón, puede añadirse un poco más de jugo al final de la cocción. Tener en cuenta que la salsa continuará espesando a medida que se incorpore más jugo de limón.</p>\n</div>", "categoria": "Pastas y ñoquis"}, {"titulo": "Brócoli asado con crocante de castañas de cajú y chile", "img": "REEMPLAZAR_brocoli.jpg", "ingredientes": ["aceite de oliva", "aceite vegetal", "agua", "ajo", "brocoli", "castañas de caju", "chile crisp/picante", "manteca de castañas de caju", "pan rallado/panko", "pimienta negra", "sal", "salsa de soja", "tofu"], "ingredientes_raw_canon": [["brocoli"], ["aceite de oliva"], ["salsa de soja"], ["sal"], ["pimienta negra"], ["ajo"], ["castañas de caju"], ["aceite vegetal", "chile crisp/picante"], ["pan rallado/panko"], ["tofu"], ["manteca de castañas de caju", "castañas de caju"], ["agua"], ["sal"], ["pimienta negra"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Brócoli asado con crocante de castañas de cajú y chile</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_brocoli.jpg\" alt=\"Brócoli asado con crocante de castañas de cajú y chile\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes — Brócoli</h3>\n  <ul class=\"ingredientes\">\n    <li>700 g de brócoli (aproximadamente 2 cabezas medianas), cortado en flores</li>\n    <li>4 cucharadas de aceite de oliva extra virgen</li>\n    <li>2 cucharaditas de salsa de soja</li>\n    <li>Sal, a gusto</li>\n    <li>Pimienta negra, a gusto</li>\n    <li>1 diente de ajo cortado en láminas finas</li>\n    <li>½ taza de castañas de cajú picadas groseramente</li>\n    <li>1 cucharada de chile crisp (aceite crocante con chile), más cantidad adicional para servir si se desea</li>\n    <li>⅓ taza de panko (pan rallado japonés)</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Crema de castañas de cajú (opcional)</h3>\n  <ul class=\"ingredientes\">\n    <li>400 g de tofu sedoso escurrido</li>\n    <li>1 taza de manteca de castañas de cajú</li>\n    <li>6 cucharadas de agua</li>\n    <li>Sal, a gusto</li>\n    <li>Pimienta negra, a gusto</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Precalentar el horno a 200 °C.</li>\n    <li>Cubrir una placa para horno grande con papel aluminio.</li>\n    <li>Colocar el brócoli sobre la placa y rociarlo con 3 cucharadas de aceite de oliva y la salsa de soja.</li>\n    <li>Condimentar con sal y pimienta y mezclar bien para que todas las piezas queden cubiertas.</li>\n    <li>Distribuir en una sola capa y agregar las láminas de ajo por encima.</li>\n    <li>Cubrir firmemente con otra hoja de papel aluminio, sellando bien los bordes.</li>\n    <li>Hornear durante aproximadamente 15 minutos, hasta que el brócoli esté tierno pero conserve cierta firmeza.</li>\n    <li>Mientras tanto, preparar el crocante.</li>\n    <li>Calentar la cucharada restante de aceite de oliva en una sartén mediana a fuego medio.</li>\n    <li>Agregar las castañas de cajú y condimentar con sal y pimienta.</li>\n    <li>Cocinar durante unos 3 minutos, revolviendo con frecuencia, hasta que desprendan aroma.</li>\n    <li>Incorporar el chile crisp y mezclar.</li>\n    <li>Agregar el panko y continuar cocinando durante 2 a 3 minutos más, revolviendo constantemente, hasta que el panko esté dorado y crocante.</li>\n    <li>Rectificar la sazón si fuera necesario.</li>\n    <li>Retirar del fuego y reservar sobre un plato cubierto con papel absorbente.</li>\n    <li>Si se desea preparar la crema de castañas de cajú, colocar el tofu sedoso, la manteca de castañas de cajú y el agua en una procesadora o licuadora.</li>\n    <li>Procesar hasta obtener una crema suave y aireada.</li>\n    <li>Condimentar generosamente con sal y pimienta.</li>\n    <li>Para servir, extender la crema de castañas de cajú sobre una fuente o plato amplio.</li>\n    <li>Distribuir el brócoli caliente por encima.</li>\n    <li>Rociar con un poco más de chile crisp si se desea.</li>\n    <li>Finalizar con una cantidad generosa del crocante de castañas de cajú y panko.</li>\n    <li>Servir de inmediato, acompañado con el crocante sobrante o más chile crisp aparte.</li>\n  </ol>\n</div>", "categoria": "Vegetales y guarniciones"}, {"titulo": "Huevos turcos con yogurt y manteca especiada", "img": "fotos/Huevos_turcos_con_yogurt_y_manteca_especiada.jpg", "ingredientes": ["aceite de oliva", "aji molido/chile en polvo", "ajo", "eneldo", "huevos", "manteca", "pan", "perejil", "pimienta negra", "sal", "vinagre", "yogur"], "ingredientes_raw_canon": [["yogur"], ["ajo"], ["manteca", "aceite de oliva"], ["pimienta negra", "aji molido/chile en polvo"], ["huevos"], ["vinagre"], ["sal"], ["pimienta negra"], ["perejil", "eneldo"], ["pan"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Huevos turcos con yogurt y manteca especiada</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Huevos_turcos_con_yogurt_y_manteca_especiada.jpg\" alt=\"Huevos turcos con yogurt y manteca especiada\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>1 taza de yogur espeso colado (preferentemente yogur griego), a temperatura ambiente</li>\n    <li>1 diente de ajo pequeño, rallado finamente</li>\n    <li>3 cucharadas de manteca, aceite de oliva o una combinación de ambos</li>\n    <li>1 cucharada de pimienta de Alepo (Aleppo pepper) o 1 cucharadita de ají molido, ajustando a gusto</li>\n    <li>4 huevos grandes</li>\n    <li>2 cucharadas de vinagre blanco</li>\n    <li>Sal, a gusto</li>\n    <li>Pimienta negra, a gusto</li>\n    <li>Eneldo fresco o perejil fresco picado (opcional)</li>\n    <li>Pan rústico tostado o pan plano, para acompañar</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Llevar una cacerola mediana con agua a fuego medio hasta que alcance un hervor muy suave.</li>\n    <li>Mientras tanto, preparar la base de yogur.</li>\n    <li>En un bowl pequeño, mezclar el yogur con el ajo rallado hasta integrar.</li>\n    <li>Distribuir la mezcla en dos platos hondos o bowls poco profundos, extendiéndola con el dorso de una cuchara.</li>\n    <li>En una sartén pequeña o cacerola, calentar la manteca, el aceite de oliva o la combinación elegida.</li>\n    <li>Agregar la pimienta de Alepo o el ají molido y cocinar durante aproximadamente 30 segundos, hasta que desprenda aroma. Retirar del fuego y reservar.</li>\n    <li>Romper cada huevo en recipientes individuales pequeños.</li>\n    <li>Añadir el vinagre al agua caliente.</li>\n    <li>Con una cuchara, generar un suave remolino en el agua y agregar los huevos de a uno, procurando que queden separados.</li>\n    <li>Cocinar entre 2 y 3 minutos, hasta que las claras estén firmes y las yemas permanezcan cremosas.</li>\n    <li>Retirar cuidadosamente los huevos con una espumadera y escurrir el exceso de agua.</li>\n    <li>Colocar dos huevos sobre cada porción de yogur.</li>\n    <li>Condimentar con sal y pimienta negra.</li>\n    <li>Rociar con la manteca especiada caliente.</li>\n    <li>Finalizar con eneldo o perejil fresco picado si se desea.</li>\n    <li>Servir de inmediato acompañado con pan tostado o pan plano para aprovechar la salsa y las yemas.</li>\n  </ol>\n</div>", "categoria": "Desayuno y meriendas"}, {"titulo": "Ensalada de repollo con aderezo Green Goddess de palta", "img": "REEMPLAZAR_ensalada.jpg", "ingredientes": ["aceite de oliva", "aceite vegetal", "ajo", "albahaca", "anchoas", "buttermilk", "cebolla de verdeo", "ciboulette", "cilantro", "estragon", "jalapeño", "leche", "limon", "palta", "perejil", "pimienta negra", "repollo", "sal"], "ingredientes_raw_canon": [["palta"], ["leche", "buttermilk"], ["limon"], ["aceite vegetal", "anchoas"], ["cebolla de verdeo"], ["ajo"], ["perejil"], ["ciboulette"], ["estragon"], ["aceite de oliva"], ["albahaca"], ["sal"], ["pimienta negra"], ["repollo"], ["cebolla de verdeo"], ["jalapeño"], ["cilantro"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Ensalada de repollo con aderezo Green Goddess de palta</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_ensalada.jpg\" alt=\"Ensalada de repollo con aderezo Green Goddess de palta\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes — Aderezo</h3>\n  <ul class=\"ingredientes\">\n    <li>1 palta madura, sin carozo y cortada en cubos</li>\n    <li>¾ taza de buttermilk (suero de leche)</li>\n    <li>¼ taza de jugo de limón recién exprimido</li>\n    <li>2 filetes de anchoa en aceite</li>\n    <li>2 cebollas de verdeo, en rodajas</li>\n    <li>1 diente de ajo pelado y aplastado</li>\n    <li>¼ taza de perejil fresco picado (hojas y tallos tiernos)</li>\n    <li>3 cucharadas de ciboulette picada</li>\n    <li>2 cucharadas de estragón fresco picado</li>\n    <li>2 cucharadas de aceite de oliva extra virgen</li>\n    <li>1 cucharada de albahaca fresca picada</li>\n    <li>Sal, a gusto</li>\n    <li>Pimienta negra recién molida, a gusto</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Ensalada</h3>\n  <ul class=\"ingredientes\">\n    <li>4 tazas de repollo blanco finamente cortado (aproximadamente ½ repollo pequeño)</li>\n    <li>4 cebollas de verdeo finamente cortadas</li>\n    <li>1 jalapeño en rodajas finas, sin semillas si se prefiere menos picante</li>\n    <li>¼ taza de cilantro fresco picado, más cantidad adicional para decorar</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación — Aderezo</h3>\n  <ol class=\"preparacion\">\n    <li>Colocar en una procesadora o licuadora la palta, el buttermilk, el jugo de limón, las anchoas, las cebollas de verdeo, el ajo, el perejil, la ciboulette, el estragón, el aceite de oliva y la albahaca.</li>\n    <li>Procesar durante 1 a 2 minutos, hasta obtener una preparación lisa, homogénea y de color verde intenso.</li>\n    <li>Probar y ajustar la sal y la pimienta a gusto.</li>\n    <li>Reservar.</li>\n  </ol>\n\n  <h3 class=\"subtitulo\">Preparación — Ensalada</h3>\n  <ol class=\"preparacion\">\n    <li>En un bowl grande, mezclar el repollo, las cebollas de verdeo, el jalapeño y el cilantro.</li>\n    <li>Agregar aproximadamente 1 taza del aderezo Green Goddess y mezclar bien para que todos los ingredientes queden cubiertos de manera uniforme.</li>\n    <li>Condimentar con sal y pimienta a gusto.</li>\n    <li>Finalizar con más cilantro fresco picado por encima.</li>\n    <li>Servir de inmediato o refrigerar durante unas horas para que los sabores se integren mejor.</li>\n    <li>Antes de servir, mezclar nuevamente y agregar más aderezo si fuera necesario.</li>\n  </ol>\n  <p class=\"nota\">Conservación: el aderezo sobrante puede conservarse en la heladera durante 1 o 2 días en un recipiente hermético.</p>\n</div>", "categoria": "Ensaladas"}, {"titulo": "Galletas de frambuesas y chocolate blanco", "img": "fotos/Galletas_de_frambuesas_y_chocolate_blanco.jpg", "ingredientes": ["azucar", "bicarbonato de sodio", "chocolate blanco", "esencia de vainilla", "frambuesas liofilizadas", "harina comun", "huevos", "manteca", "polvo de hornear", "sal"], "ingredientes_raw_canon": [["manteca", "sal"], ["harina comun"], ["bicarbonato de sodio"], ["polvo de hornear"], ["sal"], ["chocolate blanco"], ["frambuesas liofilizadas"], ["azucar"], ["azucar"], ["huevos"], ["huevos"], ["esencia de vainilla"], ["chocolate blanco"], ["frambuesas liofilizadas"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Galletas de frambuesas y chocolate blanco</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Galletas_de_frambuesas_y_chocolate_blanco.jpg\" alt=\"Galletas de frambuesas y chocolate blanco\">\n  </div>\n\n  <p class=\"nota\">Rinde: 8 a 10 galletas grandes</p>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>14 cucharadas (194 g) de manteca sin sal</li>\n    <li>1¾ tazas (233 g) de harina común</li>\n    <li>½ cucharadita de bicarbonato de sodio</li>\n    <li>¼ cucharadita de polvo de hornear</li>\n    <li>¾ cucharadita de sal kosher o ½ cucharadita de sal fina</li>\n    <li>65 g de chocolate blanco troceado</li>\n    <li>23 g de frambuesas liofilizadas (freeze-dried), partidas en trozos pequeños</li>\n    <li>188 g de azúcar negra o azúcar rubia oscura compactada</li>\n    <li>95 g de azúcar común</li>\n    <li>1 huevo grande</li>\n    <li>1 clara de huevo</li>\n    <li>2 cucharaditas de pasta de vainilla o extracto puro de vainilla</li>\n    <li>30 a 60 g adicionales de chocolate blanco para decorar</li>\n    <li>Frambuesas liofilizadas adicionales para decorar</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Colocar la manteca en una cacerola mediana y cocinar a fuego medio, revolviendo ocasionalmente, hasta que tome un color dorado claro y aroma a frutos secos. Este proceso lleva aproximadamente entre 5 y 8 minutos.</li>\n    <li>Transferir la manteca a un bowl grande y dejar enfriar hasta alcanzar temperatura ambiente.</li>\n    <li>En otro bowl, mezclar la harina, el bicarbonato, el polvo de hornear y la sal.</li>\n    <li>Agregar el chocolate blanco troceado y las frambuesas liofilizadas. Mezclar para distribuir uniformemente.</li>\n    <li>A la manteca ya fría incorporar el azúcar negra, el azúcar común, el huevo, la clara y la vainilla.</li>\n    <li>Batir durante al menos 1 minuto hasta obtener una mezcla lisa, homogénea y de color más claro.</li>\n    <li>Agregar los ingredientes secos a la mezcla húmeda y revolver únicamente hasta integrar.</li>\n    <li>Dividir la masa en 8 a 10 porciones iguales, de aproximadamente 90 a 125 g cada una. También pueden hacerse galletas más pequeñas si se prefiere.</li>\n    <li>Colocar las porciones sobre una bandeja o plato grande, cubrir con film y refrigerar durante toda la noche o hasta 24 horas.</li>\n    <li>Cuando llegue el momento de hornear, retirar la masa de la heladera y dejar que alcance temperatura ambiente.</li>\n    <li>Precalentar el horno a 180 °C.</li>\n    <li>Cubrir 2 o 3 placas para horno con papel manteca.</li>\n    <li>Distribuir las porciones de masa dejando aproximadamente 7 a 8 cm de separación entre ellas.</li>\n    <li>Aplastar suavemente cada porción con la palma de la mano hasta obtener un grosor de unos 2,5 cm.</li>\n    <li>Hornear una placa por vez durante 12 a 15 minutos, girándola a mitad de cocción, hasta que los bordes estén apenas dorados y el centro se vea seco.</li>\n    <li>Retirar del horno y, mientras las galletas aún estén calientes, presionar un trozo de chocolate blanco en el centro de cada una.</li>\n    <li>Espolvorear con más frambuesas liofilizadas desmenuzadas.</li>\n    <li>Dejar enfriar unos minutos sobre la placa y luego transferir a una rejilla para que se enfríen por completo.</li>\n  </ol>\n  <p class=\"nota\">Conservación: las galletas se conservan frescas hasta 3 días en un recipiente hermético a temperatura ambiente.</p>\n</div>", "categoria": "Dulces y postres"}, {"titulo": "Papines dorados con arándanos, cebolla morada y aderezo de mostaza", "img": "fotos/Papines_dorados_con_arandanos__cebolla_morada_y_aderezo_de_mostaza.jpg", "ingredientes": ["aceite de oliva", "arandanos", "cebolla", "ciboulette", "cilantro", "limon", "menta", "mostaza", "papas/papines", "vinagre"], "ingredientes_raw_canon": [["papas/papines"], ["cebolla"], ["arandanos"], [], ["menta"], ["cilantro"], ["ciboulette"], ["mostaza"], ["aceite de oliva"], ["vinagre"], ["limon"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Papines dorados con arándanos, cebolla morada y aderezo de mostaza</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Papines_dorados_con_arandanos__cebolla_morada_y_aderezo_de_mostaza.jpg\" alt=\"Papines dorados con arándanos, cebolla morada y aderezo de mostaza\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>600 g de papines</li>\n    <li>1 cebolla morada</li>\n    <li>100 g de arándanos</li>\n    <li>50 g de ajíes picantes en conserva (opcional)</li>\n    <li>¼ atado de hojas de menta</li>\n    <li>¼ atado de hojas de cilantro</li>\n    <li>½ atado de ciboulette</li>\n    <li>30 g de mostaza</li>\n    <li>100 cc de aceite de oliva</li>\n    <li>30 cc de vinagre</li>\n    <li>Ralladura de limón</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Hervir los papines en abundante agua, con apenas un chorro de vinagre. Cocinar hasta que al pinchar estén tiernas. Dejar enfriar y luego cortar en mitades.</li>\n    <li>Dorarlos en una sartén caliente con aceite de oliva. Condimentar con sal y pimienta, dejar enfriar y servir en un plato. Arriba acomodar cebolla en gajos, los ajíes, arándanos y hierbas.</li>\n    <li>Para el aderezo, mezclar el vinagre con la mostaza, sal y pimienta. Agregar el aceite en forma de hilo sin dejar de revolver. Por último, el ciboulette picado fino. Servir sobre las papas y terminar con ralladura de limón.</li>\n  </ol>\n  <p class=\"nota\">Tip del chef: también se puede hacer con papas que hayan sobrado del día anterior. Se cortan en pedazos y se doran en manteca y aceite. El vinagre del hervor ayuda a que no se pasen y se hagan puré las papas.</p>\n</div>", "categoria": "Vegetales y guarniciones"}, {"titulo": "Pan de papa", "img": "fotos/Pan_de_Papa.jpg", "ingredientes": ["aceite de oliva", "crema de leche", "harina comun", "levadura", "papas/papines", "queso crema", "sal"], "ingredientes_raw_canon": [["papas/papines"], ["harina comun"], ["crema de leche", "queso crema"], ["levadura"], ["sal"], ["aceite de oliva"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Pan de papa</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Pan_de_Papa.jpg\" alt=\"Pan de papa\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>500 g de puré de papas</li>\n    <li>450 g de harina</li>\n    <li>350 g de queso crema</li>\n    <li>25 g de levadura</li>\n    <li>15 g de sal</li>\n    <li>50 cc de aceite de oliva</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Mezclar el puré de papas con la sal. Por otro lado, mezclar la levadura con el queso crema.</li>\n    <li>Unir ambas preparaciones y agregar la harina.</li>\n    <li>Amasar durante 5 minutos y dejar leudar en un lugar cálido y tapado, hasta que duplique su tamaño.</li>\n    <li>Dividir el bollo en 8 a 10 piezas y formar bollitos pequeños.</li>\n    <li>Dejarlos descansar 15 minutos más.</li>\n    <li>Dorarlos en sartén con aceite de oliva de ambos lados.</li>\n    <li>Hornear a 200 °C durante 10 minutos.</li>\n  </ol>\n</div>", "categoria": "Panes y tartas"}, {"titulo": "Sopa de tomates ligerita", "img": "fotos/Sopa_de_tomates_ligerita.jpg", "ingredientes": ["aceite de oliva", "agua", "ajo", "albahaca", "cebolla", "chile crisp/picante", "oregano", "pimienta negra", "sal", "tomates", "yogur"], "ingredientes_raw_canon": [["ajo"], ["cebolla"], ["tomates"], ["tomates"], ["sal"], ["pimienta negra"], ["agua"], ["yogur"], [], ["albahaca"], ["oregano"], ["aceite de oliva"], ["chile crisp/picante"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Sopa de tomates ligerita</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"fotos/Sopa_de_tomates_ligerita.jpg\" alt=\"Sopa de tomates ligerita\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>1 diente de ajo</li>\n    <li>1 cebolla chiquita</li>\n    <li>1 kg de tomates</li>\n    <li>1 cucharadita de extracto de tomate (si tienen)</li>\n    <li>1 cucharadita de sal</li>\n    <li>Pimienta, a gusto</li>\n    <li>500 cc de agua</li>\n    <li>1 yogur natural (ideal light)</li>\n    <li>1 cucharada de miso (o un caldito en su defecto)</li>\n    <li>Un puñado de hojas de albahaca (si tienen, sino albahaca seca)</li>\n    <li>Orégano</li>\n    <li>Aceite de oliva</li>\n    <li>Algún picante tipo wasabi, tabasco, etc.</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Picar el ajo y la cebolla y saltearlos en aceite de oliva con sal.</li>\n    <li>Agregar los tomates en cubitos y el extracto de tomate.</li>\n    <li>Dejar cocinar durante 15 minutos y agregar la albahaca, el orégano, la sal y la pimienta.</li>\n    <li>Una vez que los tomates estén blanditos, retirar del fuego y agregar el yogur y una cucharada de miso.</li>\n    <li>Procesar y servir.</li>\n  </ol>\n</div>", "categoria": "Sopas"}, {"titulo": "Pasta con gambas mediterráneas", "img": "REEMPLAZAR_pasta_gambas.jpg", "ingredientes": ["ajo", "albahaca", "cebolla", "crema de leche", "espinaca", "langostinos/mariscos", "leche", "pasta/fideos", "perejil", "pollo", "queso crema", "queso rallado", "tomates", "tomates secos"], "ingredientes_raw_canon": [["pasta/fideos"], ["ajo"], ["pollo", "langostinos/mariscos"], ["cebolla"], ["tomates secos"], ["espinaca"], ["tomates"], ["albahaca"], ["leche", "crema de leche", "queso crema"], ["queso rallado", "perejil"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Pasta con gambas mediterráneas</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_pasta_gambas.jpg\" alt=\"Pasta con gambas mediterráneas\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>1 paquete de spaghettis ya cocidos</li>\n    <li>2 dientes de ajo picados</li>\n    <li>500 g de langostinos limpios (puede ser pollo en tiritas)</li>\n    <li>1 cebolla picada</li>\n    <li>50 g de tomates secos, ya rehidratados</li>\n    <li>1 paquete de espinaca cruda</li>\n    <li>250 g de tomates cherry</li>\n    <li>Albahaca</li>\n    <li>200 cc de crema de leche o queso crema light (uno ligero)</li>\n    <li>Queso rallado y perejil, para servir</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Saltear el ajo en aceite de oliva y agregar los langostinos. Sellarlos de ambos lados y retirar.</li>\n    <li>En la misma sartén agregar la cebolla picada (sumar más aceite de oliva si es necesario). Cuando esté blandita, agregar los tomates secos cortados en tiritas, las hojas de espinaca y por último los tomates cherry.</li>\n    <li>Agregar el queso crema, la albahaca picada y el perejil (dejar un poco extra para decorar). Salpimentar y agregar los spaghettis.</li>\n    <li>Mezclar todo y agregar los langostinos.</li>\n    <li>Espolvorear con queso rallado y un poco más de perejil picado.</li>\n  </ol>\n</div>", "categoria": "Carnes y pescados"}, {"titulo": "Ñoquis de papa a la sartén", "img": "REEMPLAZAR_noquis_sarten.jpg", "ingredientes": ["harina comun", "huevos", "papas/papines", "sal"], "ingredientes_raw_canon": [["papas/papines"], ["sal"], ["harina comun"], ["huevos"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Ñoquis de papa a la sartén</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_noquis_sarten.jpg\" alt=\"Ñoquis de papa a la sartén\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>300 g de papas</li>\n    <li>200 g de sal gruesa</li>\n    <li>50 g de harina</li>\n    <li>1 yema</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Cocinar las papas al horno con cáscara sobre un colchón de sal gruesa.</li>\n    <li>Una vez listas, pelarlas y hacer un puré.</li>\n    <li>Agregarle la yema y la harina y amasar.</li>\n    <li>Armar chorizos, luego cuadraditos y darles forma con ayuda de un tenedor.</li>\n    <li>Cocinarlos brevemente en agua hirviendo (retirarlos ni bien suben) y sellarlos en manteca u oliva hasta que se doren.</li>\n  </ol>\n  <p class=\"nota\">Se pueden servir con la salsa de los langostinos en lugar de los spaghettis.</p>\n</div>", "categoria": "Pastas y ñoquis"}, {"titulo": "Creme caramel", "img": "REEMPLAZAR_creme_caramel.jpg", "ingredientes": ["agua", "azucar", "crema de leche", "esencia de vainilla", "huevos", "leche", "manteca", "sal"], "ingredientes_raw_canon": [["azucar"], ["agua"], ["leche", "crema de leche"], ["manteca"], ["sal"], ["leche"], ["leche", "crema de leche"], ["azucar"], ["huevos"], ["esencia de vainilla"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Creme caramel</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_creme_caramel.jpg\" alt=\"Creme caramel\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes — Salsa de caramelo salado</h3>\n  <ul class=\"ingredientes\">\n    <li>150 g de azúcar</li>\n    <li>80 ml de agua</li>\n    <li>60 ml de crema de leche</li>\n    <li>45 g de manteca</li>\n    <li>Pizca de sal en escamas (de ser posible, sino entrefina)</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Crema</h3>\n  <ul class=\"ingredientes\">\n    <li>750 ml de leche</li>\n    <li>250 ml de crema de leche</li>\n    <li>160 g de azúcar</li>\n    <li>6 yemas de huevo</li>\n    <li>Esencia de vainilla</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación — Salsa</h3>\n  <ol class=\"preparacion\">\n    <li>Hacer un caramelo con el azúcar y 50 ml de agua.</li>\n    <li>Poner a hervir la crema de leche con los 30 ml de agua restante.</li>\n    <li>Agregarla de a poco al caramelo una vez que hierva.</li>\n    <li>Agregar la manteca y la sal. Mezclar todo para emulsionar.</li>\n  </ol>\n\n  <h3 class=\"subtitulo\">Preparación — Crema</h3>\n  <ol class=\"preparacion\">\n    <li>Colocar en un bowl las yemas y la mitad de la leche con la esencia de vainilla. Mezclar bien sin hacer espuma.</li>\n    <li>Poner en una cacerolita la mitad de la leche con la crema y el azúcar. Una vez que empiece a hacer burbujitas, agregar esto al bowl con las yemas.</li>\n    <li>Mezclar bien rápidamente y llevar a frío por una hora (ideal).</li>\n    <li>Poner la salsa en el fondo de las cazuelitas (pueden ser los frasquitos de yogur de vidrio) y dividir la crema sobre esto.</li>\n    <li>Llevar a horno bajo por una hora y luego volver a enfriar.</li>\n  </ol>\n</div>", "categoria": "Dulces y postres"}, {"titulo": "Cinnamon buns", "img": "REEMPLAZAR_cinnamon_buns.jpg", "ingredientes": ["azucar", "canela", "crema de leche", "esencia de almendra", "esencia de vainilla", "harina comun", "huevos", "jalea kero", "leche", "levadura", "limon", "manteca", "papas/papines", "pecanas", "sal"], "ingredientes_raw_canon": [["harina comun"], ["leche"], ["levadura"], ["papas/papines"], ["leche"], ["manteca"], ["sal"], ["azucar"], ["harina comun"], ["huevos"], ["limon"], ["azucar"], ["canela"], ["manteca"], ["azucar"], ["leche", "crema de leche"], ["esencia de almendra"], ["esencia de vainilla"], ["jalea kero"], ["manteca"], ["pecanas"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Cinnamon buns</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_cinnamon_buns.jpg\" alt=\"Cinnamon buns\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes — Esponja</h3>\n  <ul class=\"ingredientes\">\n    <li>100 g de harina 0000</li>\n    <li>120 cc de leche</li>\n    <li>30 g de levadura fresca</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Masa</h3>\n  <ul class=\"ingredientes\">\n    <li>200 g de puré de papa</li>\n    <li>120 cc de leche</li>\n    <li>70 g de manteca</li>\n    <li>5 g de sal fina</li>\n    <li>120 g de azúcar</li>\n    <li>400 g de harina 0000</li>\n    <li>55 g de huevo</li>\n    <li>Ralladura de 1 limón</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Relleno</h3>\n  <ul class=\"ingredientes\">\n    <li>160 g de azúcar negra</li>\n    <li>10 g de canela molida</li>\n    <li>100 g de manteca</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Glaseado</h3>\n  <ul class=\"ingredientes\">\n    <li>200 g de azúcar impalpable</li>\n    <li>60 cc de crema de leche</li>\n    <li>Esencia de almendra amarga, c/n</li>\n    <li>Esencia de vainilla, c/n</li>\n    <li>100 g de jalea kero</li>\n    <li>60 g de manteca</li>\n    <li>50 g de nuez pecana</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Para la esponja: unir la harina, la leche y la levadura, y dejar fermentar hasta que duplique su volumen. Luego utilizar.</li>\n    <li>Para la masa: calentar el puré con la leche, la manteca, la sal y el azúcar, hasta disolver el azúcar. Entibiar a temperatura ambiente.</li>\n    <li>Hacer una corona con la harina y en el centro colocar la esponja y la mezcla de papas, el huevo y la ralladura.</li>\n    <li>Formar una masa blanda. Trabajarla y agregar harina en caso necesario, para que no se pegue en la mesada.</li>\n    <li>Dejar en sitio tibio hasta que duplique su volumen.</li>\n    <li>Estirar la masa en forma rectangular hasta un espesor de 1 cm.</li>\n    <li>Untar la masa con la manteca pomada. Espolvorear con canela y el azúcar.</li>\n    <li>Arrollar y cortar de 12 a 16 porciones. Estibar en placa alta. Dejar levar al doble.</li>\n    <li>Hornear a 180 °C durante aproximadamente 20 minutos. Retirar del horno y volcar el glaseado.</li>\n    <li>Para el glaseado: mezclar todos los ingredientes y volcar sobre los buns al momento de sacar del horno. Decorar con kero.</li>\n  </ol>\n</div>", "categoria": "Desayuno y meriendas"}, {"titulo": "Fritura de mar", "img": "REEMPLAZAR_fritura_mar.jpg", "ingredientes": ["harina comun", "huevos", "langostinos/mariscos", "mayonesa", "pan rallado/panko", "pescado blanco", "salsa sriracha"], "ingredientes_raw_canon": [["langostinos/mariscos"], ["pescado blanco"], ["harina comun"], ["pan rallado/panko"], ["mayonesa"], ["pan rallado/panko"], ["salsa sriracha"], ["langostinos/mariscos"], ["huevos"], ["harina comun"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Fritura de mar</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_fritura_mar.jpg\" alt=\"Fritura de mar\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes — Frituras</h3>\n  <ul class=\"ingredientes\">\n    <li>500 g de cornalito</li>\n    <li>400 g de filet de pejerrey</li>\n    <li>200 g de harina 0000</li>\n    <li>Inglesa para empanar, c/n</li>\n    <li>200 g de mayonesa</li>\n    <li>200 g de pan rallado</li>\n    <li>Salsa sriracha, c/n</li>\n    <li>400 g de tubo de calamar</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Ingredientes — Rebozado para rabas</h3>\n  <ul class=\"ingredientes\">\n    <li>3 claras de huevo</li>\n    <li>150 g de harina 0000</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Cortar los filetes de pejerrey en cuadrados, empanar a la inglesa y freír.</li>\n    <li>Rebozar los cornalitos a la romana y freír.</li>\n    <li>Mezclar la mayonesa con la salsa sriracha.</li>\n    <li>Para el rebozado de las rabas: mezclar las claras con parte de la harina hasta obtener la consistencia de un engrudo espeso.</li>\n    <li>Salar las rabas (tubos de calamar) y mezclarlas con esta preparación.</li>\n    <li>Al momento de freír, retirar las rabas, pasarlas por harina y freírlas.</li>\n  </ol>\n</div>", "categoria": "Carnes y pescados"}, {"titulo": "Chipa de remolacha rellena con queso azul", "img": "REEMPLAZAR_chipa_remolacha.jpg", "ingredientes": ["aceite de oliva", "fecula de mandioca", "huevos", "leche", "queso azul", "queso rallado", "remolacha"], "ingredientes_raw_canon": [["remolacha"], ["huevos"], ["queso rallado"], ["fecula de mandioca"], ["aceite de oliva"], ["leche"], ["queso azul"], ["remolacha"]], "html": "<div class=\"receta\">\n  <h2 class=\"titulo-receta\">Chipa de remolacha rellena con queso azul</h2>\n\n  <div class=\"imagen-plato\">\n    <img src=\"REEMPLAZAR_chipa_remolacha.jpg\" alt=\"Chipa de remolacha rellena con queso azul\">\n  </div>\n\n  <h3 class=\"subtitulo\">Ingredientes</h3>\n  <ul class=\"ingredientes\">\n    <li>1 remolacha (para incorporar al puré de la masa)</li>\n    <li>1 huevo</li>\n    <li>200 g de queso rallado</li>\n    <li>300 g de fécula de mandioca</li>\n    <li>70 g de aceite de oliva</li>\n    <li>10 g de leche</li>\n    <li>Queso azul, para el relleno</li>\n    <li>2 remolachas pequeñas cocidas</li>\n  </ul>\n\n  <h3 class=\"subtitulo\">Preparación</h3>\n  <ol class=\"preparacion\">\n    <li>Cocer las remolachas y procesarlas hasta obtener un puré.</li>\
